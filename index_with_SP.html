  docs:["BMC ฉบับ 3 ระยะ (Short/Mid/Long Term): แต่ละแผ่นแสดงการเปลี่ยนแปลงองค์ประกอบและตาราง Evolution","ตารางเชื่อมโยง Intelligent Risk กับ BMC 3 ระยะ: ระบุความเสี่ยงที่ต้องยอมรับเพื่อก้าวสู่ระยะถัดไป","รายงานการบูรณาการ BMC สู่แผนแม่บท (ระดับ 4): แสดงว่า BMC 3 ระยะถูกนำไปปรับ CM, IM, หรือ Action Plan อื่นๆ อย่างไร"],
  bp:["ทั้ง กทพ. และ รฟม. เจอปัญหาเดียวกัน: TRIS ให้ Feedback ว่า BMC 'ยังมีความไม่ชัดเจนในหลายองค์ประกอบ' — กทท. สามารถเป็น Best Practice ได้หากทำ 3 Business Models สำเร็จเป็นรายแรก"]},
  {id:"2.3",grp:"2",gname:"การวิเคราะห์ตำแหน่งทางยุทธศาสตร์",gw:10,gs68:2.25,name:"การวิเคราะห์ Scenario Planning",w:2.5,s68:1.0,status:"ยังไม่เริ่ม",statusNote:"",
  good:["กทท. มีการกำหนดขั้นตอน Scenario Planning ไว้ใน SIPOC 3 และ 4 — ผ่านเกณฑ์เพียงระดับ 1 เนื่องจากขาดตัวเลขประมาณการทางการเงิน"],
  results:["มีการระบุขั้นตอนการวิเคราะห์ Scenario Planning ไว้ใน SIPOC 3 และ 4 ชัดเจน"],
  gaps:["ขาดประมาณการทางการเงินแยกตามสถานการณ์: ต้องมีตัวเลข Worst/Base/Best Case พร้อมสมมติฐานที่วิเคราะห์","ยังไม่มีการวิเคราะห์ Cost-Benefit ของแต่ละทางเลือกเพื่อใช้ประกอบการเลือกยุทธศาสตร์","ขาดแผนป้องกันความเสี่ยงสูงสุด (Worst Case Mitigation Plan)"],
  actions:["ทำงานร่วมกับฝ่ายการเงินเพื่อจัดทำ Financial Scenario Planning อย่างน้อย 3 รูปแบบ (Base/Best/Worst) ระบุสมมติฐาน เช่น ปริมาณตู้สินค้า, GDP, อัตราเงินเฟ้อ พร้อมแผนรับมือ Worst Case"],
  docs:["รายงานประมาณการทางการเงิน 3 สถานการณ์ (Scenario Planning Report): ตัวเลขรายได้/ค่าใช้จ่าย/กำไรแต่ละ Scenario","เอกสารสมมติฐาน (Assumptions): แสดงที่มาของการคำนวณแต่ละสถานการณ์","รายงาน Cost-Benefit Analysis: เพื่อใช้ประกอบการตัดสินใจเลือกยุทธศาสตร์","แผนรับมือ Worst Case (Mitigation Plan): ป้องกันผลกระทบทางการเงิน"],
  bp:["กทพ. และ รฟม. ทำ Scenario Planning 3 รูปแบบ (Worst/Base/Best) ครอบคลุมระยะยาว มีสมมติฐานชัดเจน","จุดที่คู่เทียบพลาด (กทท. ทำได้ดีกว่า): TRIS แนะว่ากรอบระยะเวลา Scenario ควรตรงกับ Strategic Positioning และ Business Model"]},
  {id:"3.1",grp:"3",gname:"การกำหนดวัตถุประสงค์เชิงยุทธศาสตร์",gw:10,gs68:2.25,name:"การกำหนดวัตถุประสงค์เชิงยุทธศาสตร์ (SO)",w:2.5,s68:3.0,status:"ยังไม่เริ่ม",statusNote:"",
  good:["กทท. มีกระบวนการตั้ง SO ที่ชัดเจน นำ Benchmark มาตั้งเป้าหมาย และเชื่อมโยง SO ลงสู่ยุทธศาสตร์และกลยุทธ์ระดับองค์กรได้ครบถ้วน (ผ่านระดับ 1–3)"],
  results:["มีกระบวนการตั้ง SO ผ่าน SIPOC 4 (ขั้นตอนที่ 12) ใช้ข้อมูลสภาพแวดล้อมที่อัปเดต","นำเป้าหมายวิสัยทัศน์และ Strategic Positioning เปรียบเทียบกับ Benchmark เพื่อตั้งเป้าหมาย SO","มีการ Cascade SO ลงสู่ระดับยุทธศาสตร์และกลยุทธ์ขององค์กร"],
  gaps:["การเชื่อมโยง SO ลงสู่แผนแม่บทยังขาดรายละเอียด: ต้องแสดงการจับคู่ว่า SO แต่ละข้อถูกรับไปเป็น SO และเป้าประสงค์ของแผนแม่บทใด","ต้องการรายละเอียดขั้นตอนและข้อมูลที่ใช้บูรณาการกับแต่ละแผนแม่บทให้ครบถ้วนทุกแผน","ขาดการประเมินประสิทธิผลกระบวนการกำหนด SO (ระดับ 5)"],
  actions:["เชิญเจ้าของแผนแม่บททุกแผนมาทำ Alignment Matrix ร่วมกัน: จับคู่ว่า SO องค์กรแต่ละข้อถูกนำไปตั้งเป็น SO และเป้าประสงค์ของแผนแม่บทนั้นๆ อย่างไร (1 ต่อ 1 หรือ 1 ต่อหลาย)","กำหนด KPI ประเมินกระบวนการตั้ง SO (SIPOC 4 ขั้นตอนที่ 12) เช่น ความครอบคลุมของ Benchmark และนำมาปรับปรุงปีถัดไป"],
  docs:["Alignment Matrix (ฉบับลงลึก): จับคู่ SO องค์กร → SO ของแต่ละแผนแม่บท → เป้าประสงค์/ตัวชี้วัดของแผนแม่บท","เอกสารแนวทางการประเมินประสิทธิผลการตั้ง SO (KPI in Process): สำหรับระดับ 5","รายงานการประชุมปรับปรุงกระบวนการ: แสดงว่ากระบวนการตั้ง SO มีประสิทธิภาพดีขึ้น"],
  bp:["ทั้ง กทพ. และ รฟม. ทำในระดับ 4 ได้ โดยเชื่อมโยง SO กับยุทธศาสตร์ของแผนแม่บท พร้อมเป้าประสงค์ที่เกี่ยวข้องครบถ้วน — กทท. ต้องนำรูปแบบตาราง Alignment ของคู่เทียบมาปรับใช้"]},
  {id:"3.2",grp:"3",gname:"การกำหนดวัตถุประสงค์เชิงยุทธศาสตร์",gw:10,gs68:2.25,name:"ความสมดุลและสอดคล้องของ SO กับองค์ประกอบสำคัญ",w:5,s68:2.0,status:"ยังไม่เริ่ม",statusNote:"",
  good:["กทท. มีการนำ SC, SA, CC มาตั้งเป็นฐานกำหนด SO ครบถ้วน และมีตารางจับคู่ SO กับ 14 ปัจจัยสำคัญ ผ่านเกณฑ์ระดับ 1–2"],
  results:["นำ SC, SA, CC มาเป็นฐานกำหนด SO ครบถ้วน","มีตารางแสดงความเชื่อมโยงระหว่าง SO กับปัจจัยสำคัญ 14 ปัจจัย"],
  gaps:["ยังขาดการอธิบายความสมดุล (Balance): มีตาราง Mapping แต่ยังไม่มีคำอธิบายว่า ยุทธศาสตร์ที่กำหนดสร้างความสมดุลระหว่างระยะสั้น-ยาว, ผู้มีส่วนได้ส่วนเสียหลายกลุ่ม และการปรับตัวขององค์กรได้อย่างไร","ความเชื่อมโยง SO ลงสู่แผนแม่บท (ระดับ 4) ยังขาดรายละเอียดว่าแผนลูกรองรับความสมดุลอย่างไร","ยังขาดการประเมินประสิทธิผลกระบวนการตรวจสอบความสมดุล (ระดับ 5)"],
  actions:["จัดทำรายงานวิเคราะห์ความสมดุลเชิงยุทธศาสตร์: อธิบาย 3 มิติ ได้แก่ สมดุลระยะสั้น-ยาว, สมดุลผู้มีส่วนได้ส่วนเสีย, และความสามารถในการปรับตัว","นำหลักการ BSC มาอธิบายความสมดุล: แสดงว่า SO ครอบคลุมทุกมุมมอง (การเงิน, ลูกค้า, กระบวนการ, การเรียนรู้)","กำหนด KPI ประเมินกระบวนการ: เช่น 'ร้อยละความครอบคลุมประเด็นยุทธศาสตร์ในแผนแม่บท'"],
  docs:["รายงานวิเคราะห์ความสมดุลเชิงยุทธศาสตร์ (Balancing Analysis Report): อธิบายว่า ยุทธศาสตร์รักษาสมดุลระยะสั้น-ยาว และตอบโจทย์ผู้มีส่วนได้ส่วนเสียครบทุกกลุ่มได้อย่างไร","Alignment Matrix ฉบับอธิบายความสมดุล: ระบุว่าแผน RM และ IM เข้ามาอุดช่องว่าง SC อย่างไร (ยืนยันระดับ 4)","เอกสารแนวทางประเมินประสิทธิผลกระบวนการตรวจสอบความสมดุล: พร้อมรายงานปรับปรุง (ระดับ 5)"],
  bp:["กทพ. ใช้ Strategy Map เพื่ออธิบายความสัมพันธ์เชิงเหตุและผล (Cause-Effect) ของกลยุทธ์ต่างๆ ภายใต้ BSC ได้โดดเด่น","กทท. ควรนำ Strategy Map มาใช้ตอบโจทย์คำว่า 'ความสมดุล' ตามที่ TRIS ต้องการ"]},
  {id:"3.3",grp:"3",gname:"การกำหนดวัตถุประสงค์เชิงยุทธศาสตร์",gw:10,gs68:2.25,name:"การออกแบบระบบงาน (Work Systems) รองรับ SO",w:2.5,s68:2.0,status:"ยังไม่เริ่ม",statusNote:"",
  good:["กทท. มีกระบวนการออกแบบระบบงานผ่าน SIPOC 5 ทบทวน Work Process และ SLA เพื่อตอบสนองความต้องการลูกค้า และมีการถ่ายทอด SO ลงสู่ระดับสายงานพร้อมผู้รับผิดชอบ"],
  results:["มี SIPOC 5 ระบุขั้นตอนการทบทวนระบบงานทั้งหมดขององค์กร","ถ่ายทอด SO ลงสู่ระดับยุทธศาสตร์และแผนงาน พร้อมระบุผู้รับผิดชอบชัดเจน","มีการจัดทำ Gantt Chart กิจกรรมย่อยพร้อมกรอบเวลา","ส่งข้อมูลให้ฝ่าย HR เพื่อพิจารณาโครงสร้างองค์กรใหม่ (ปี 68–69)"],
  gaps:["ยังขาดการเชื่อมโยงกับสถาปัตยกรรมองค์กรในอนาคต (EA To-be): การทบทวนระบบงานยังไม่แสดงความสอดคล้องกับภาพ EA ในอนาคตอย่างเป็นรูปธรรม","ขาดการระบุอำนาจหน้าที่ (Roles & Responsibilities) สำหรับโครงการใหม่ (New Initiatives) อย่างชัดเจน","ยังขาดการประเมินประสิทธิผลกระบวนการออกแบบระบบงาน (ระดับ 5)"],
  actions:["ทำ EA To-Be Mapping: ฝ่ายกลยุทธ์ร่วมกับ IT และ HR กางภาพโครงสร้างอนาคต (EA To-Be) และจับคู่กับระบบงาน (Work System) และ SLA ที่ถูกปรับปรุง","ออกเอกสารโครงสร้างทีมงานสำหรับ New Initiatives: ระบุ Roles & Responsibilities อย่างชัดเจนสำหรับโครงการใหม่","กำหนด KPI ประเมินกระบวนการ SIPOC 5: เช่น ร้อยละความสอดคล้องของระบบงานกับยุทธศาสตร์"],
  docs:["รายงานเชื่อมโยงระบบงานกับ EA To-Be: อธิบายว่าการปรับปรุง Work Process และ SLA สอดคล้องกับภาพอนาคตอย่างไร","คำสั่ง/โครงสร้างองค์กร และ Roles & Responsibilities สำหรับโครงการใหม่ (New Initiatives): ยืนยันระดับ 3","แนวทางประเมินประสิทธิผล SIPOC 5 และรายงานปรับปรุง: พร้อม Before/After (ระดับ 5)"],
  bp:["ทั้ง กทพ. และ รฟม. มี Gap เดียวกันกับ กทท. คือ TRIS แนะว่า 'ต้องทบทวนระบบงานให้ครอบคลุม New Initiatives โดยเฉพาะ' — กทท. มีโอกาสเป็น Best Practice หากออกเอกสาร Work System Design สำหรับ New Initiatives สำเร็จเป็นรายแรก"]},
  {id:"4.1",grp:"4",gname:"การกำหนดยุทธศาสตร์/กลยุทธ์",gw:10,gs68:2.0,name:"การกำหนดยุทธศาสตร์ระดับองค์กร",w:5,s68:2.0,status:"ยังไม่เริ่ม",statusNote:"",
  good:["กทท. มีกระบวนการกำหนดยุทธศาสตร์ที่ชัดเจน ใช้ข้อมูล SC/SA/CC และ Benchmark มีตาราง Cascade ครบถ้วน และมี Strategy Map ตามหลัก BSC ผ่านเกณฑ์ระดับ 1–2"],
  results:["มีกระบวนการกำหนดยุทธศาสตร์และกลยุทธ์ชัดเจนใน SIPOC 4 (ขั้นตอนที่ 13)","ใช้ข้อมูล Strategic Positioning, Benchmark และ SO มากำหนดกลยุทธ์ พร้อมตาราง Cascade","มี Strategy Map ครอบคลุม BSC 4 ด้าน (การเงิน, ลูกค้า, กระบวนการ, การเรียนรู้)","มีตาราง Cascade ตัวชี้วัดและเป้าหมายจากระดับวิสัยทัศน์ลงสู่ระดับกลยุทธ์"],
  gaps:["การเชื่อมโยง 'แผนงานสำคัญ (Key Initiatives)' ลงสู่แผนแม่บทยังไม่ครบถ้วน: TRIS ต้องการเห็นว่าแผนงานภายใต้กลยุทธ์ถูกถ่ายทอดลงไปเป็นแผนงานของแผนแม่บทใดบ้าง","ยังขาดการประเมินประสิทธิผลกระบวนการกำหนดยุทธศาสตร์ (ระดับ 5)"],
  actions:["ขยาย Alignment Matrix ให้ถึงระดับ 'แผนงานหลัก': เพิ่มคอลัมน์ 'แผนงานที่สำคัญระดับองค์กร' และโยงไปยัง 'แผนงานในแผนแม่บท' แบบชัดเจน (เช่น แผนงาน IT ขององค์กร → แผนงาน A ในแผนดิจิทัล)","กำหนด KPI ประเมินกระบวนการ SIPOC 4 (ขั้นตอนที่ 13): เช่น ร้อยละความสอดคล้องของแผนงานองค์กรกับแผนแม่บท และนำผลมาปรับปรุงในปีถัดไป","ออกแบบฟอร์ม Template ที่บังคับให้ทุกกลยุทธ์ต้องระบุแผนงานหลักและเจ้าภาพแผนแม่บท"],

  {id:"7.3",grp:"7",gname:"กระบวนการติดตามผล/ปรับเปลี่ยนแผน",gw:15,gs68:2.1,name:"กระบวนการปรับเปลี่ยนแผนงาน (ปกติ/เร่งด่วน)",w:5,s68:1.65,status:"ยังไม่เริ่ม",statusNote:"",

  results:["มีกระบวนการปรับเปลี่ยนแผน 2 กรณี: ปกติ (SIPOC 8) และเร่งด่วน (SIPOC 9) พร้อมหนังสือเวียนแจ้งพนักงาน","กำหนดเงื่อนไขการปรับแผน: ต้องระบุสาเหตุและผ่านความเห็นชอบจากคณะกรรมการฝ่ายบริหารและบอร์ด","มีกลไก Fast-track: หากโครงการได้ระดับ 1–2 ในไตรมาส 2 สามารถปรับแผนได้ทันทีโดยไม่ต้องรอรอบปกติ"],

  actions:["เพิ่มช่อง 'Trigger Point' ในแบบฟอร์มแผนปฏิบัติการ: ให้ทุกโครงการระบุล่วงหน้าว่า Leading Indicator ตกถึงค่าใดจึงต้องขอปรับแผนฉุกเฉิน","จัดทำ 'Post-Adjustment Success Report' หลังสิ้นปีงบประมาณ: สำหรับโครงการที่บอร์ดอนุมัติปรับแผน แสดงว่าผลสำเร็จครบ 4 มิติ (กิจกรรม, Output, Outcome, ผลกระทบ)","กำหนด KPI ประเมินกระบวนการ SIPOC 9: เช่น ระยะเวลาตั้งแต่เกิด Trigger ถึงบอร์ดอนุมัติ ต้องไม่เกิน X วัน"],

// ══════════════════════════════════
// STATE
// ══════════════════════════════════
let curDim='hcm';
let focusId=null;
const targets={hcm:{},im:{},sp:{}};
Object.keys(DATA).forEach(dk=>{DATA[dk].subs.forEach(s=>targets[dk][s.id]=s.s68);});

function subs(){return DATA[curDim].subs;}
function orig(){return DATA[curDim].orig;}
function sClass(st){return st==='เสร็จแล้ว'?'s2':st==='กำลังดำเนินการ'?'s1':'s0';}
function sIcon(st){return st==='เสร็จแล้ว'?'✓':st==='กำลังดำเนินการ'?'●':'○';}
function fmt(n){return n.toFixed(4);}
function calcGroupScore(gid){const ss=subs().filter(s=>s.grp===gid);return ss.reduce((a,s)=>a+s.w*targets[curDim][s.id],0)/ss[0].gw;}
function calcTotal(){const tw=subs().reduce((a,s)=>a+s.w,0);return subs().reduce((a,s)=>a+s.w/tw*targets[curDim][s.id],0);}
function dotColor(id){const t=targets[curDim][id],diff=t-subs().find(x=>x.id===id).s68;if(diff<0.01)return 'dg';if(diff<0.5)return 'da';return 'dr';}

function switchDim(dim){
  curDim=dim;focusId=null;
  document.getElementById('tab-hcm').classList.toggle('active',dim==='hcm');
  document.getElementById('tab-im').classList.toggle('active',dim==='im');
  document.getElementById('tab-sp').classList.toggle('active',dim==='sp');
  const lhd=document.getElementById('leftHd');
  lhd.className='left-hd '+(dim==='hcm'?'left-hd-hcm':dim==='im'?'left-hd-im':'left-hd-sp');
  const ftag=document.getElementById('frameTag');
  ftag.style.background=dim==='hcm'?'#4a7a9a':dim==='im'?'#6a3ab0':'#2e7d32';
  renderAll();
}

function renderLeft(){
  const body=document.getElementById('leftBody');body.innerHTML='';
  const d=DATA[curDim];
  document.getElementById('dimTitle').textContent=d.dimName;
  document.getElementById('dimOrig').textContent='ปัจจุบัน '+fmt(d.orig);
  document.getElementById('totalLbl').textContent='คะแนนรวม '+d.dimId;
  document.getElementById('totalOrig').textContent=fmt(d.orig);
  const grps=[...new Set(subs().map(s=>s.grp))];
  grps.forEach(gid=>{
    const ss=subs().filter(s=>s.grp===gid);const first=ss[0];
    const gs=calcGroupScore(gid);const diff=gs-first.gs68;const cc=diff<-0.001?'cr':diff>0.001?'ct':'cn';
    const gDiv=document.createElement('div');gDiv.className='grp';
    gDiv.innerHTML=`<span class="grp-id">${gid}</span><span class="grp-name">${first.gname}</span><span class="grp-wt">(${first.gw}%)</span><div class="grp-scores"><span class="chip cn" style="font-size:10px;">${fmt(first.gs68)}</span><span style="color:#999;font-size:10px;">→</span><span class="chip ${cc}" style="font-size:10px;" id="gs-${curDim}-${gid}">${fmt(gs)}</span></div>`;
    body.appendChild(gDiv);
    ss.forEach(s=>{
      const fc='focus-'+curDim;
      const row=document.createElement('div');row.className='sub'+(focusId===s.id?' '+fc:'');row.id='subrow-'+s.id;
      row.innerHTML=`<div class="sub-left"><div class="sub-meta"><span class="sub-num">${s.id}</span><span class="sub-name">${s.name}</span><span class="sub-wt">(${s.w}%)</span><span class="sub-now">ปี 68: ${fmt(s.s68)}</span></div></div><div class="sub-target" id="st-${s.id}"><span class="target-lbl">เป้า</span><input class="target-inp" id="ti-${s.id}" type="text" value="${fmt(targets[curDim][s.id])}" style="border-color:${curDim==='hcm'?'#ccc':'#ccc'}"><span class="dot ${dotColor(s.id)}" id="dot-${s.id}"></span></div>`;
      row.addEventListener('click',()=>{focusId=s.id;renderAll();});
      body.appendChild(row);
      const inp=row.querySelector('.target-inp');
      inp.addEventListener('input',e=>{const v=parseFloat(e.target.value);if(!isNaN(v)&&v>=1&&v<=5){targets[curDim][s.id]=v;updateScores();}});
      inp.addEventListener('click',e=>e.stopPropagation());
      const strip=document.createElement('div');strip.className='sstrip';
      strip.innerHTML=`<span class="sbadge ${sClass(s.status)}">${sIcon(s.status)} ${s.status}</span>`+(s.statusNote?`<span class="snote">${s.statusNote}</span>`:'<span class="snote" style="color:#ccc;">ยังไม่มีข้อมูล</span>');
      strip.addEventListener('click',()=>{focusId=s.id;renderAll();});
      body.appendChild(strip);
    });
  });
}

function updateScores(){
  const grps=[...new Set(subs().map(s=>s.grp))];
  grps.forEach(gid=>{
    const gs=calcGroupScore(gid);const diff=gs-subs().filter(s=>s.grp===gid)[0].gs68;
    const el=document.getElementById('gs-'+curDim+'-'+gid);
    if(el){el.textContent=fmt(gs);el.className='chip '+(diff<-0.001?'cr':diff>0.001?'ct':'cn');}
  });
  subs().forEach(s=>{const d=document.getElementById('dot-'+s.id);if(d)d.className='dot '+dotColor(s.id);});
  const total=calcTotal();const delta=total-orig();
  document.getElementById('totalChip').textContent='คาดการณ์ '+fmt(total);
  document.getElementById('totalChip').className='chip '+(delta>0?'ct':delta<0?'cr':'cn');
  document.getElementById('totalFooter').textContent=fmt(total);
  document.getElementById('totalFooter').className='chip '+(delta>0?'ct':delta<0?'cr':'cn');
  document.getElementById('deltaChip').textContent=(delta>=0?'+':'')+fmt(delta)+' pts';
  document.getElementById('deltaChip').style.color=delta>0?'#1a9a50':delta<0?'#c03020':'#888';
  document.getElementById('deltaFooter').textContent=(delta>=0?'+':'')+fmt(delta);
  document.getElementById('deltaFooter').style.color=delta>0?'#5fcf8a':delta<0?'#f0806a':'#888';
}

function renderRight(){
  const body=document.getElementById('rightBody');
  if(!focusId){body.innerHTML='<div style="display:flex;align-items:center;justify-content:center;height:100%;color:#aaa;font-size:13px;">คลิก sub-item ด้านซ้ายเพื่อดูรายละเอียด</div>';return;}
  const s=subs().find(x=>x.id===focusId);if(!s){body.innerHTML='';return;}
  const tval=targets[curDim][s.id];
  const gH=s.gaps.map(g=>`<div class="box box-red" style="margin-bottom:6px;">• ${g}</div>`).join('');
  const bH=s.bp.map(b=>`<div class="box box-teal" style="margin-bottom:5px;">${b}</div>`).join('');
  const rH=s.results.map(r=>`<div class="match-row m-ok"><span>✓</span><span>${r}</span></div>`).join('');
  const lH=(s.gaps||[]).slice(0,3).map(g=>`<div class="match-row m-no"><span>✗</span><span>${g.split(':')[0]}</span><span class="m-lvl" style="background:#fcd0cc;color:#7a1010;">Gap</span></div>`).join('');
  const dH=s.docs.map(d=>`<div class="doc-row"><div class="doc-dot doc-new"></div><span style="flex:1;">${d}</span><span class="doc-status" style="background:#c0d0e8;color:#102848;">ต้องทำ</span></div>`).join('');
  const eH=s.statusNote?`<div style="background:#f5f0fc;border-left:3px solid #c4b0e8;border-radius:0 5px 5px 0;padding:7px 10px;font-size:11px;line-height:1.6;color:#333;">${s.statusNote}</div>`:'<div style="color:#bbb;font-size:11px;font-style:italic;">ยังไม่มีข้อมูล — รอ admin อัปเดต</div>';
  body.innerHTML=`
    <div style="padding:6px 12px;font-size:11px;background:#edeae0;border-bottom:1px solid #d4d0c8;display:flex;align-items:center;gap:8px;flex-shrink:0;position:sticky;top:0;z-index:2;">
      <span style="font-weight:700;color:#1c2b3a;">ข้อ ${s.id}</span><span style="color:#555;">${s.name}</span>
      <span style="margin-left:auto;font-size:10px;background:#e0ddd4;color:#444;padding:1px 7px;border-radius:8px;">ปัจจุบัน ${fmt(s.s68)}</span>
      <span style="font-size:10px;">→</span>
      <span style="font-size:10px;background:#c5e8d5;color:#0a4a2a;padding:1px 7px;border-radius:8px;font-weight:700;">เป้า ${fmt(tval)}</span>
    </div>
    <div class="frame"><div class="frame-hd fa-hd"><span class="ftag fa-tag">A</span><span style="color:#7a1010;">TRIS ต้องการ — ช่องว่างที่ต้องปิด</span></div><div class="frame-bd">${gH||'<div style="color:#999;">—</div>'}</div></div>
    <div class="frame"><div class="frame-hd fb-hd"><span class="ftag fb-tag">B</span><span style="color:#0a4a20;">หน่วยงานอื่นทำอะไรในข้อนี้ (Best Practice)</span></div><div class="frame-bd">${bH||'<div style="color:#999;">—</div>'}</div></div>
    <div class="frame"><div class="frame-hd fc-hd"><span class="ftag fc-tag">C</span><span style="color:#4a4a00;">กทท. ตอบอะไรไป</span></div><div class="frame-bd"><div class="box box-gray" style="margin-bottom:8px;">${s.good[0]||'—'}</div><div style="font-size:10px;color:#888;margin-bottom:4px;font-weight:600;">ผลการดำเนินงานที่นำเสนอ:</div>${rH}<div style="font-size:10px;color:#888;margin:8px 0 4px;font-weight:600;">ช่องว่างที่ยังขาด:</div>${lH}</div></div>
    <div class="frame"><div class="frame-hd fd-hd"><span class="ftag fd-tag">D</span><span style="color:#102848;">เอกสาร / หลักฐานที่ต้องเพิ่ม</span></div><div class="frame-bd">${dH||'<div style="color:#999;">—</div>'}</div></div>
    <div class="frame" style="border-bottom:none;"><div class="frame-hd fe-hd"><span class="ftag fe-tag">E</span><span style="color:#2a1060;">สถานะการดำเนินงาน</span><span class="sbadge ${sClass(s.status)}" style="margin-left:auto;">${sIcon(s.status)} ${s.status}</span></div><div class="frame-bd">${eH}</div></div>`;
}

function renderChecklist(){
  if(!focusId){document.getElementById('clTitle').textContent='เลือก sub-item เพื่อดู Action Checklist';document.getElementById('clItems').innerHTML='';return;}
  const s=subs().find(x=>x.id===focusId);if(!s)return;
  document.getElementById('clTitle').textContent=`Action Checklist — ข้อ ${s.id} · เป้า ${fmt(targets[curDim][s.id])}`;
  document.getElementById('clItems').innerHTML=s.actions.map((a,i)=>`<div class="cl-item"><input type="checkbox" id="cl-${s.id}-${i}"><label for="cl-${s.id}-${i}">${a}</label></div>`).join('');
}

function renderAll(){renderLeft();renderRight();renderChecklist();updateScores();}
renderAll();
</script>
</body>
