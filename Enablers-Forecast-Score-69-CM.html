  good:["มีการทบทวนและจัดทำ แผนยุทธศาสตร์ด้านผู้มีส่วนได้ส่วนเสียระยะยาว ปี 2569-2573 และแผนปฏิบัติการปี 2569 โดยผ่านการเห็นชอบจากคณะกรรมการฝ่ายบริหาร และคณะกรรมการ กทท.","เปิดโอกาสให้ผู้มีส่วนได้ส่วนเสียมีส่วนร่วม โดยมีการจัดทำ Focus Group (ผู้เข้าร่วม 107 คน) เพื่อรับฟังความคิดเห็นและนำข้อมูล (Insight) มาปรับปรุงแผนยุทธศาสตร์","มีการจัดทำและสื่อสารแผนปฏิบัติการประจำปีไปยังหน่วยงานทั้งภายในและภายนอกองค์กรผ่าน Website, ระบบออนไลน์ และการจัดประชุมสัมมนา","มีการจัดทำ โครงสร้างผู้รับผิดชอบลึกลงไปถึงระดับแผนก และรายงานต่อคณะกรรมการ กทท."],
  results:["ระดับ 1-2: รวบรวมข้อมูลสารสนเทศที่สำคัญ วิเคราะห์สภาพแวดล้อมภายใน/ภายนอก ระบุจุดแข็ง จุดอ่อน โอกาส อุปสรรค (SWOT) และจัดทำ Workshop Stakeholder Profile","ระดับ 3: แผนยุทธศาสตร์และแผนปฏิบัติการผ่านความเห็นชอบจากบอร์ด กทท. (มติครั้งที่ 9/2568) และมีการสื่อสารถ่ายทอดแผนผ่าน Website และกิจกรรมต่างๆ","ระดับ 4: แผนผ่านการมีส่วนร่วม (Focus Group) มีการทบทวนระบบงาน (Work System) โดยเชื่อมโยงกับยุทธศาสตร์องค์กร (SO4) และติดตามผลดำเนินงานรายไตรมาส","ระดับ 5: มีการทำทบทวนหลังปฏิบัติงาน (AAR 1.1) และจัดเก็บความรู้ผ่านระบบ SCM Knowledge Center"],
  gaps:["ขาดกรอบ Governance ระดับองค์กรที่ชัดเจน และยังขาดการแสดงบทบาทเชิงรุก (Proactive role) ของผู้บริหารระดับสูงในการสร้างความสัมพันธ์","การวางแผนยังขาดการมุ่งเน้นเพื่อสร้าง \"มูลค่าเพิ่ม (Value Creation)\" ให้กับองค์กรอย่างเป็นรูปธรรม โดยยังคงเน้นที่การสร้างความพึงพอใจเป็นหลัก","บางหน่วยงานยังขาดการสื่อสารหรือการจัดกิจกรรมถ่ายทอดแผนอย่างครบถ้วน (เช่น ฝก. ที่กำหนดจัดในปี 2568 แต่ยังมีความล่าช้า/ช่องว่าง)","แผนยุทธศาสตร์ด้านผู้มีส่วนได้ส่วนเสียระยะยาว ควรทบทวนและพัฒนากรอบ Governance ด้านผู้มีส่วนได้ส่วนเสียที่แสดงโครงสร้างผู้รับผิดชอบในการดำเนินงานให้ชัดเจน","การวัดผล วิเคราะห์ และประเมินผลการดำเนินงานระดับองค์กร ยังขาดการรายงานผลลัพธ์ (Outcome) ที่เทียบกับค่าเป้าหมายที่ชัดเจน รวมถึงขาดการประเมินว่าผลการดำเนินงานสร้างมูลค่าเพิ่ม (Value Creation) ให้องค์กรอย่างไร"],
  actions:["ต้องผลักดันให้ผู้บริหารระดับสูงมีบทบาทเชิงรุก (Action Plan เชิงรุก) ในการเข้าพบและสร้างความสัมพันธ์กับหน่วยงานกำกับดูแล เพื่อให้เกิดนโยบายที่ช่วยยกระดับ กทท.","เปลี่ยนมุมมองการบริหารจัดการจากการเน้นความพึงพอใจ ไปสู่การสร้างมูลค่าเพิ่ม (Value Creation) แก่องค์กร","กำกับและติดตามแผนผ่านคณะกรรมการ/ผู้บริหารอย่างต่อเนื่องเป็นรายไตรมาส"],
  docs:["แผนผังโครงสร้างผู้รับผิดชอบงานด้าน SM (Top-down & Bottom-up) ที่แสดง Governance ชัดเจน","รายงาน/รายงานการประชุม (Minutes of Meeting) ที่เป็นหลักฐานแสดงให้เห็นว่า ผู้บริหารสูงสุดมีบทบาทเชิงรุกในการเข้าพบหน่วยงานกำกับดูแลเพื่อผลักดันนโยบายสำคัญ","รายงานผลลัพธ์ทางธุรกิจ (Value Creation) ที่เกิดจากความร่วมมือกับผู้มีส่วนได้ส่วนเสีย (เช่น MOU กับพันธมิตรที่ช่วยเพิ่มรายได้ หรือลดต้นทุน) โดยต้องแสดงตัวเลขเชิงปริมาณที่ชัดเจน (Outcome) ห้ามใช้คำว่า \"สำเร็จ 100%\""],
  bp:["กทพ. (การทางพิเศษฯ): มีความโดดเด่นในการวิเคราะห์ข้อมูลจากแผนแม่บทระยะยาวอื่นๆ ที่เกี่ยวข้องอย่างรอบด้าน เพื่อนำมาบูรณาการในการจัดทำแผนยุทธศาสตร์ด้านผู้มีส่วนได้ส่วนเสีย","รฟม. (การรถไฟฟ้าขนส่งมวลชนฯ): แผนยุทธศาสตร์ด้านผู้มีส่วนได้ส่วนเสียระยะยาว ผ่านการมีส่วนร่วมของผู้มีส่วนได้ส่วนเสียที่สำคัญครบทุกกลุ่ม โดยใช้เครื่องมือที่หลากหลาย เช่น แบบสำรวจ การประชุมเชิงปฏิบัติการ และการสัมภาษณ์เชิงลึก เพื่อนำความคิดเห็นไปวางแผนการดำเนินงานได้อย่างครอบคลุม"],
  scopeNote:"มิตินี้มุ่งเน้นประเมินความสามารถขององค์กรในการวิเคราะห์ข้อมูลรอบด้านเพื่อมากำหนดเป็น \"ทิศทางและแผนยุทธศาสตร์ระยะยาว\" รวมถึงความสามารถในการผลักดันแผนนั้นไปสู่การปฏิบัติ โดยแบ่งความลึกซึ้งเป็น 5 ระดับ ",
  dimLevels:["Level 1: มุ่งเน้น \"ความครอบคลุมของข้อมูล\" โดยองค์กรต้องรวบรวมและคัดเลือกข้อมูลสารสนเทศที่สำคัญมาวิเคราะห์เพื่อทำแผนยุทธศาสตร์ เช่น ข้อมูลกลุ่มผู้มีส่วนได้ส่วนเสียเดิม, ความคาดหวังเชิงบวก/ลบ, โอกาสและความเสี่ยง, กฎหมาย/นโยบายรัฐที่เปลี่ยนแปลง, เป้าหมาย SDGs และความพร้อมของทรัพยากร เป็นต้น","Level 2: มุ่งเน้น \"การวิเคราะห์เชิงยุทธศาสตร์\" โดยต้องนำข้อมูลจาก Level 1 มาวิเคราะห์ SWOT เพื่อระบุความท้าทาย (Strategic Challenge) และความได้เปรียบ (Strategic Advantage) นำไปสู่การตั้งวัตถุประสงค์ ขอบเขต และเป้าหมายภาพรวมขององค์กรด้านผู้มีส่วนได้ส่วนเสีย","Level 3: มุ่งเน้น \"การอนุมัติและการถ่ายทอด\" โดยแผนยุทธศาสตร์ระยะยาวจะต้องผ่านความเห็นชอบจาก \"คณะกรรมการรัฐวิสาหกิจ (บอร์ด)\" และถูกแปลงไปสู่แผนปฏิบัติการประจำปีของแต่ละสายงาน/ฝ่าย รวมถึงต้องสื่อสารเป้าหมายและตัวชี้วัดลงไปถึงระดับบุคคล และถ่ายทอดให้หน่วยงานภายนอก/พันธมิตรรับทราบ","Level 4: มุ่งเน้น \"การมีส่วนร่วมและการบูรณาการระบบ\" แผนยุทธศาสตร์ต้องผ่านการมีส่วนร่วมจาก Stakeholder ที่สำคัญ นอกจากนี้ องค์กรต้องทบทวน \"กรอบ Governance\" และ \"ระบบงาน (Work System)\" ให้สอดรับกับแผนยุทธศาสตร์ พร้อมตั้งเกณฑ์วัดประเมินผลในระดับองค์กรและระดับฝ่ายอย่างชัดเจน","Level 5: มุ่งเน้น \"การเรียนรู้สู่นวัตกรรม\" ต้องนำผลการจัดทำแผนมาทบทวน (AAR) ต่อยอดเป็นนวัตกรรมด้านกระบวนการจัดทำยุทธศาสตร์ และจัดเก็บลงระบบดิจิทัลขององค์กร"],
  minReqs:{1:["(L1-L2): แผนยุทธศาสตร์ด้านผู้มีส่วนได้ส่วนเสียระยะยาว ฉบับปัจจุบัน ที่ครอบคลุมปีที่ประเมิน","เอกสารที่แสดงการวิเคราะห์สารสนเทศต่างๆ อย่างครอบคลุม เพื่อนำมากำหนดยุทธศาสตร์/กลยุทธ์ ด้านการมุ่งเน้นผู้มีส่วนได้ส่วนเสีย"],2:["(L1-L2): แผนยุทธศาสตร์ด้านผู้มีส่วนได้ส่วนเสียระยะยาว ฉบับปัจจุบัน ที่ครอบคลุมปีที่ประเมิน","เอกสารที่แสดงการวิเคราะห์ SWOT, ความท้าทาย และความได้เปรียบ ของการดำเนินงานด้านการบริหารจัดการผู้มีส่วนได้ส่วนเสีย"],3:["แผนปฏิบัติการประจำปีภายใต้แผนยุทธศาสตร์ด้านผู้มีส่วนได้ส่วนเสีย","รายงานการประชุมคณะกรรมการรัฐวิสาหกิจ (บอร์ด) หรือคณะอนุกรรมการที่เกี่ยวข้อง ที่มีวาระ \"ให้ความเห็นชอบ/อนุมัติ\" แผนยุทธศาสตร์ด้านผู้มีส่วนได้ส่วนเสียระยะยาว"],4:["เอกสารแสดงขั้นตอน วิธีการ กระบวนการ (เช่น SIPOC) ในการจัดทำแผนยุทธศาสตร์","เอกสารหลักฐานที่แสดงถึง \"การมีส่วนร่วม\" ของผู้มีส่วนได้ส่วนเสียที่สำคัญในการจัดทำ/ทบทวนยุทธศาสตร์ (เช่น รายงานผลการจัด Focus Group)","เอกสารตาราง/แผนภาพ ที่แสดงความเชื่อมโยงแผนยุทธศาสตร์ด้านผู้มีส่วนได้ส่วนเสียระยะยาว กับ \"แผนแม่บทด้านอื่นๆ (Alignment)\" ขององค์กร","เอกสารแสดงการกำหนดและทบทวน \"กรอบ Governance\" ด้านผู้มีส่วนได้ส่วนเสียขององค์กร","เอกสารแสดงการทบทวน \"ระบบงานและกระบวนการทำงานที่สำคัญ (Work System)\" ให้สอดคล้องกับยุทธศาสตร์","เอกสารรายงานผลการติดตามการดำเนินงานตามแผนปฏิบัติการฯ (เช่น รายงานผลรายไตรมาส ระดับองค์กรและระดับฝ่าย)"],5:["เอกสารแบบบันทึกการทบทวนกระบวนการเรียนรู้และจัดการความรู้ (เช่น AAR กระบวนการจัดทำยุทธศาสตร์)","ภาพหน้าจอ (Screen Capture) ตัวอย่างระบบดิจิทัล (เช่น SCM Knowledge Center) ที่แสดงให้เห็นการจัดเก็บองค์ความรู้ด้านการจัดทำยุทธศาสตร์อย่างเป็นระบบ"]},
  subComps:{1:["รายละเอียด Stakeholder ขององค์กรที่ผ่านมา","รายละเอียด Stakeholder ของแต่ละสายงาน/ฝ่ายที่ผ่านมา","ฐานข้อมูล Stakeholder Profile","ความต้องการ/ความคาดหวังทั้งเชิงบวกและลบ","โอกาสและความเสี่ยงด้าน Stakeholder","ผลการดำเนินงาน/ผลการเรียนรู้ที่ผ่านมา","แผนยุทธศาสตร์/แผนวิสาหกิจและแผนแม่บทระยะยาวที่เกี่ยวข้อง","การเปลี่ยนแปลงนโยบาย กฎหมาย/กฎระเบียบ","การเปลี่ยนแปลงภายนอกองค์กร (เศรษฐกิจ สังคม สิ่งแวดล้อม เทคโนโลยี)","เป้าหมาย SDGs และ สมรรถนะหลักขององค์กร","ความพร้อมของทรัพยากร (งบ/คน) และกรอบ Governance/ระบบงาน"],2:["จุดแข็ง จุดอ่อน โอกาส อุปสรรค (SWOT)","ความท้าทายเชิงยุทธศาสตร์ และความได้เปรียบเชิงยุทธศาสตร์","วัตถุประสงค์ ขอบเขต Stakeholder องค์กร และประเด็นความต้องการ","ยุทธศาสตร์ด้าน Stakeholder และเป้าหมายภาพรวม"],4:["ผ่านการมีส่วนร่วมของผู้มีส่วนได้ส่วนเสียที่สำคัญ","ทบทวน/ปรับปรุง/พัฒนา กรอบ Governance","ทบทวนระบบงาน (Work System) และกระบวนการทำงานที่สำคัญ","กำหนดแนวทางการวัด วิเคราะห์ และประเมินผลระดับองค์กรและระดับฝ่าย"]}},
  {id:"2.1",grp:"2",gname:"วัตถุประสงค์ ขอบเขต และผู้มีส่วนได้ส่วนเสีย",gw:10.0,gs68:4.1,name:"การกำหนดวัตถุประสงค์ (Purpose) และขอบเขต (Scope) ของการสร้างความสัมพันธ์ กับผู้มีส่วนได้ส่วนเสีย (Stakeholder Engagement)",w:3.0,s68:4.1,status:"ยังไม่เริ่ม",statusNote:"",
  good:["กทท. มีการวิเคราะห์เพื่อกำหนดวัตถุประสงค์อย่างครอบคลุม ทั้งแบบ Top-down (ตามทิศทางแผนวิสาหกิจ กทท.) และ Bottom-up (ตามบทบาทและ Value Chain ของแต่ละฝ่าย)","มีการทบทวนและปรับลดวัตถุประสงค์จาก 13 ข้อ เหลือเพียง 6 ข้อ เพื่อให้ทุกฝ่ายเข้าใจตรงกันและนำไปปฏิบัติได้ชัดเจนยิ่งขึ้น รวมถึงใช้มาตรฐาน AA1000SES (10 แนวทาง) มาเป็นกรอบบริหารจัดการ","การกำหนดขอบเขต (Scope) มีความชัดเจนใน 3 มิติ คือ 1) มิติกลุ่มผู้มีส่วนได้ส่วนเสีย 2) มิติเชิงพื้นที่ (ท่าเรือกรุงเทพ, แหลมฉบัง, ท่าเรือภูมิภาค) และ 3) มิติด้านระยะเวลา (ปี 2569-2573)","แผนดังกล่าวผ่านการเห็นชอบจากคณะกรรมการ (บอร์ด) กทท. และมีการถ่ายทอดสื่อสารผ่านหลายช่องทาง ทั้งการประชุมสัมมนา เว็บไซต์ และช่องทางออนไลน์"],
  results:["ระดับ 1: มี SIPOC กระบวนการกำหนดวัตถุประสงค์และขอบเขต","ระดับ 2: มีการวิเคราะห์ Top-down/Bottom-up, ขอบเขต 3 มิติ และการจัดทำ Workshop Stakeholder Profile","ระดับ 3: มีมติบอร์ด กทท. เห็นชอบแผนฯ และมีหลักฐานการถ่ายทอดแผนผ่าน PPT, เว็บไซต์, และช่องทางออนไลน์","ระดับ 4: มีการเชื่อมโยงระดับองค์กรและระดับฝ่าย ผ่าน Workshop Stakeholder Profile แบบฟอร์มที่ 2","ระดับ 5: มีการทำ AAR 2.1 และจัดเก็บข้อมูลในระบบ SCM Knowledge Center"],
  gaps:["แม้จะมีการทบทวนกระบวนการด้วยระบบ AAR แล้ว แต่ยังขาดการวิเคราะห์และพัฒนานวัตกรรมกระบวนการอย่างเป็นระบบ","ขาดการกำหนด \"ตัวชี้วัดกระบวนการ (Process KPI)\" สำหรับการประเมินประสิทธิผลของการกำหนดวัตถุประสงค์และขอบเขต","การจัดเก็บองค์ความรู้และนวัตกรรมที่ได้จากการทบทวนกระบวนการลงในระบบดิจิทัล (SCM Knowledge Center) ยังมีรายละเอียดไม่ครบถ้วน","ผู้ประเมิน TRIS มองว่า กทท. เริ่มมีการทบทวนกระบวนการแล้ว แต่สิ่งที่ยังเป็น Gap คือ ควรมีการวิเคราะห์รายละเอียดของการปรับปรุงและพัฒนานวัตกรรมกระบวนการที่มีคุณภาพครบถ้วน ต้องแสดงให้เห็นที่มาและผลที่เกิดขึ้นจากการปรับปรุง รวมทั้งยังขาดการกำหนด \"ตัวชี้วัดประสิทธิผลและค่าเป้าหมาย (Process KPI)\" และขาดการจัดเก็บนวัตกรรมลงระบบดิจิทัลอย่างครบถ้วน"],
  actions:["กทท. ควรกำหนดตัวชี้วัดประสิทธิผลและค่าเป้าหมายของกระบวนการ (Process KPI) ให้ชัดเจน และต้องสามารถแสดงรายละเอียดได้ว่า การทบทวนวัตถุประสงค์ (จาก 13 เหลือ 6 ข้อ) หรือการใช้ Focus Group นั้น สามารถผลักดันให้เกิดนวัตกรรมกระบวนการที่ลดเวลา ลดขั้นตอน หรือเพิ่มประสิทธิภาพได้อย่างไร และต้องจัดเก็บความรู้เหล่านี้ลงในระบบดิจิทัลให้สมบูรณ์","การจะดันคะแนนให้เต็ม 5.0000 ในปี 2569 กทท. จะต้องข้ามกำแพงของคำว่า \"นวัตกรรมกระบวนการ\" ให้ได้ โดยต้องเอาผล AAR มาตั้งตัวชี้วัด (Process KPI) วัดผลให้เป็นตัวเลข และโชว์หน้าจอระบบ SCM Knowledge Center ที่เก็บนวัตกรรมนี้ให้ผู้ประเมินดูเป็นหลักฐานเชิงประจักษ์"],
  docs:["เอกสารกำหนด Process KPI: รายงานที่แสดงตัวชี้วัดกระบวนการการกำหนดวัตถุประสงค์/ขอบเขต พร้อมค่าเป้าหมาย (เช่น ระยะเวลาที่ลดลงในการจัดทำแผน หรือประสิทธิภาพความเข้าใจของพนักงาน)","รายงานนวัตกรรมกระบวนการ: เอกสารสรุปผลจาก AAR ที่ถูกต่อยอดเป็น \"นวัตกรรมกระบวนการ (Process Innovation)\" พร้อมภาพหน้าจอการจัดเก็บนวัตกรรมนี้ลงในระบบ SCM Knowledge Center แบบครบถ้วนสมบูรณ์"],
  bp:["กทท. ดำเนินงานได้ดีกว่าคู่เทียบ: ในหัวข้อที่ 2 นี้ กทท. ได้คะแนน 4.1000 ซึ่งสูงกว่า รฟม. (4.0438 คะแนน) อย่างชัดเจน"],
  scopeNote:"มิตินี้มุ่งเน้นประเมินความสามารถขององค์กรในการกำหนด \"เป้าหมาย (ทำไปทำไม)\" และ \"ขอบเขต (ทำครอบคลุมแค่ไหน)\" ในการบริหารจัดการผู้มีส่วนได้ส่วนเสีย โดยประเมินความลึกซึ้งของกระบวนการใน 5 ระดับ ",
  dimLevels:["Level 1: มุ่งเน้น \"การมีอยู่\" ของกระบวนการ โดยองค์กรต้องมีการกำหนดวัตถุประสงค์และขอบเขตในระดับองค์กร (แม้จะยังไม่ชัดเจนหรือไม่มีที่มาที่ไปก็ตาม)","Level 2: มุ่งเน้น \"ความชัดเจนและการวิเคราะห์ (Top-down & Bottom-up)\" โดยวัตถุประสงค์และขอบเขตในระดับองค์กรต้องมีที่มาที่ไป ผ่านการวิเคราะห์บูรณาการร่วมกันระหว่างทิศทางระดับยุทธศาสตร์องค์กร และบริบทระดับสายงาน/ฝ่าย","Level 3: มุ่งเน้น \"การอนุมัติและการสื่อสาร\" โดยวัตถุประสงค์และขอบเขตระดับองค์กรที่วิเคราะห์มานั้น จะต้องผ่านความเห็นชอบจาก \"คณะกรรมการรัฐวิสาหกิจ (บอร์ด)\" (ไม่อนุญาตให้ใช้แค่มติอนุกรรมการฯ) และต้องถ่ายทอดสื่อสารไปยังผู้บริหาร พนักงาน และหน่วยงานภายนอกที่เกี่ยวข้อง","Level 4: มุ่งเน้น \"ความสอดคล้อง (Alignment)\" วัตถุประสงค์และขอบเขตในระดับองค์กร ต้องถูกถ่ายทอดและสอดคล้องกับระดับสายงาน/ฝ่าย และต้องถูกบรรจุให้สอดคล้องอยู่ในแผนยุทธศาสตร์ด้านผู้มีส่วนได้ส่วนเสียระยะยาว","Level 5: มุ่งเน้น \"การเรียนรู้และนวัตกรรม\" มีการทบทวนกระบวนการ (AAR) เพื่อนำไปพัฒนานวัตกรรมด้านการกำหนดวัตถุประสงค์และขอบเขต และจัดเก็บองค์ความรู้นั้นลงในระบบดิจิทัล"],
  minReqs:{1:["(L1-L2): เอกสารแสดงกระบวนการ/ขั้นตอนการกำหนดวัตถุประสงค์และขอบเขตการสร้างความสัมพันธ์ (เช่น ผัง SIPOC)"],2:["(L1-L2): เอกสารแสดงกระบวนการ/ขั้นตอนการกำหนดวัตถุประสงค์และขอบเขตการสร้างความสัมพันธ์ (เช่น ผัง SIPOC)","เอกสารหลักฐานที่แสดงถึง \"การวิเคราะห์\" วัตถุประสงค์และขอบเขต ที่เห็นการบูรณาการระหว่างระดับองค์กรและระดับฝ่าย (เช่น รายงานสรุปผลการทำ Focus Group หรือ Workshop Stakeholder Profile)"],3:["รายงานการประชุมคณะกรรมการรัฐวิสาหกิจ (บอร์ด กทท.) ที่มีมติ \"ให้ความเห็นชอบ\" วัตถุประสงค์และขอบเขตของการมุ่งเน้นผู้มีส่วนได้ส่วนเสีย","เอกสารหลักฐานที่แสดงถึงการถ่ายทอด/สื่อสารวัตถุประสงค์และขอบเขต ไปยัง \"พนักงานภายใน\" (เช่น ภาพการจัดอบรม/สัมมนา, บันทึกเวียน)","เอกสารหลักฐานที่แสดงถึงการถ่ายทอด/สื่อสารวัตถุประสงค์และขอบเขต ไปยัง \"หน่วยงานภายนอก\" (เช่น ข่าวสารบนเว็บไซต์, สื่อ Social Media, ภาพการนำเสนอต่อพันธมิตร)"],4:["เอกสารตาราง/แบบฟอร์ม ที่แสดงให้เห็นถึง \"ความเชื่อมโยง (Alignment)\" ระหว่างวัตถุประสงค์และขอบเขตระดับองค์กร กับ วัตถุประสงค์และขอบเขตระดับสายงาน/ฝ่าย (เช่น แบบฟอร์ม Workshop ที่ตีกรอบเปรียบเทียบความสอดคล้อง)"],5:["เอกสารแบบบันทึกกระบวนการเรียนรู้และจัดการความรู้ (เช่น แบบบันทึก AAR 2.1 เรื่องกระบวนการกำหนดวัตถุประสงค์และขอบเขต)","ภาพหน้าจอ (Screen Capture) ของระบบดิจิทัลองค์กร (เช่น SCM Knowledge Center) ที่แสดงให้เห็นว่าได้อัปโหลดข้อมูลความรู้/นวัตกรรมเข้าไปจัดเก็บเรียบร้อยแล้ว"]},

  {id:"2.2",grp:"2",gname:"วัตถุประสงค์ ขอบเขต และผู้มีส่วนได้ส่วนเสีย",gw:10.0,gs68:4.1,name:"การระบุผู้มีส่วนได้ส่วนเสีย",w:3.0,s68:4.1,status:"ยังไม่เริ่ม",statusNote:"",
  good:["มีการระบุผู้มีส่วนได้ส่วนเสียโดยการวิเคราะห์ผ่านห่วงโซ่คุณค่า (Value Chain) ของแต่ละสายงาน/ฝ่าย ครอบคลุมทั้ง 2 มิติ อย่างครบถ้วน (มิติที่ กทท. ส่งผลกระทบต่อกลุ่ม และกลุ่มส่งผลกระทบต่อ กทท.)","กล้าที่จะทบทวนและปรับลดกลุ่มผู้มีส่วนได้ส่วนเสียหลักเหลือ 10 กลุ่ม พร้อมระบุกลุ่มย่อยและคำจำกัดความที่ชัดเจน เพื่อให้การบริหารจัดการโฟกัสได้ตรงจุดมากขึ้น","มีการนำเทคโนโลยีดิจิทัลมาใช้ โดยการพัฒนาระบบฐานข้อมูลผู้มีส่วนได้ส่วนเสีย (Stakeholder Profile) ผ่าน \"ระบบสารสนเทศด้านการตลาด\" และมีการจัดอบรมการใช้งานให้กับพนักงานเพื่อทบทวนข้อมูลให้เป็นปัจจุบัน","ผ่านการเห็นชอบจากคณะกรรมการ (บอร์ด) กทท. และมีการถ่ายทอดสื่อสารไปยังผู้บริหารและพนักงานทุกระดับ รวมถึงหน่วยงานภายนอก"],
  results:["ระดับ 1: มีการทำ SIPOC กระบวนการระบุผู้มีส่วนได้ส่วนเสีย โดยใช้เครื่องมือสำรวจ 6 แนวทาง","ระดับ 2: มีการทบทวนกลุ่มผู้มีส่วนได้ส่วนเสียผ่าน Workshop ตามกรอบ Value Chain ครอบคลุมทุกสายงาน สรุปเหลือ 10 กลุ่มหลัก","ระดับ 3: มีมติบอร์ด กทท. เห็นชอบแผนฯ และมีการถ่ายทอดสื่อสารผ่านการประชุม/สัมมนา และเว็บไซต์","ระดับ 4: นำข้อมูลจัดเก็บลงระบบ Stakeholder Profile ในระบบสารสนเทศด้านการตลาด และมีการจัดอบรมการใช้งานระบบ","ระดับ 5: มีการทำแบบทบทวนหลังการปฏิบัติงาน (AAR 2.2) และนำเข้าสู่ระบบ SCM Knowledge Center"],
  gaps:["การจัดเก็บองค์ความรู้และนวัตกรรมลงในระบบดิจิทัลยังไม่ครบถ้วนสมบูรณ์","ยังขาดการวิเคราะห์และพัฒนานวัตกรรมกระบวนการที่เป็นระบบ รวมถึงยังไม่มีการกำหนด ตัวชี้วัดกระบวนการ (Process KPI) สำหรับกระบวนการระบุผู้มีส่วนได้ส่วนเสีย","ผู้ประเมินมองว่า กทท. มีการทบทวนและจัดกลุ่มผู้มีส่วนได้ส่วนเสียได้ดีมากในระดับโครงสร้าง (ระดับ 1-4) แต่ในระดับ 5 การแสดงรายละเอียดของการปรับปรุงและพัฒนานวัตกรรมกระบวนการยังไม่มีคุณภาพครบถ้วน ไม่เห็นที่มาและผลที่เกิดขึ้นจากการปรับปรุงอย่างเป็นระบบ และที่สำคัญคือ ขาดการกำหนดตัวชี้วัดประสิทธิผลและค่าเป้าหมาย (Process KPI) ทำให้การจัดเก็บนวัตกรรมลงระบบดิจิทัลขององค์กรยังไม่สมบูรณ์แบบ"],
  actions:["กทท. ควรนำผลลัพธ์ที่ได้จากการทำ AAR ไปจัดทำและต่อยอดเป็น \"นวัตกรรมกระบวนการ (Process Innovation)\" โดยต้องกำหนดตัวชี้วัดกระบวนการ (Process KPI) ให้ชัดเจน เช่น การลดระยะเวลาในการระบุกลุ่มเป้าหมาย หรือความแม่นยำของฐานข้อมูลที่เพิ่มขึ้น และต้องจัดเก็บนวัตกรรมกระบวนการนี้ลงในระบบดิจิทัลขององค์กรอย่างเป็นระบบ","เพื่อไปให้ถึงคะแนนเต็ม 5.0000 ในปี 2569 กทท. จะต้องนำผล AAR มาสร้างเป็น \"นวัตกรรมกระบวนการ\" กำหนด Process KPI วัดผลให้ชัดเจน และแสดงหลักฐานการบันทึกนวัตกรรมนี้ลงใน SCM Knowledge Center ให้ผู้ประเมินเห็นอย่างครบถ้วน"],
  docs:["เอกสารสรุป Process KPI: รายงานที่แสดงตัวชี้วัดประสิทธิผลของกระบวนการระบุผู้มีส่วนได้ส่วนเสีย พร้อมค่าเป้าหมายและผลลัพธ์ที่ทำได้จริง","หลักฐานการจัดเก็บนวัตกรรม: ภาพหน้าจอ (Screen Capture) ของระบบ SCM Knowledge Center ที่แสดงให้เห็นว่า กทท. ได้นำผลจากการปรับปรุงกระบวนการ (จาก AAR) ไปจัดเก็บเป็นองค์ความรู้และนวัตกรรมอย่างครบถ้วนสมบูรณ์"],
  bp:["กทท. สามารถดำเนินงานได้ดีกว่า รฟม. และ กทพ.: ในหัวข้อการระบุผู้มีส่วนได้ส่วนเสีย กทท. ได้คะแนน 4.1000 ซึ่งสูงกว่า รฟม. ที่ได้คะแนน 4.0500"],
  scopeNote:"มิตินี้มุ่งเน้นประเมินความสามารถขององค์กรในการ \"ค้นหา ระบุ และจัดลำดับ\" กลุ่มผู้มีส่วนได้ส่วนเสีย (Stakeholders) ว่ามีความครอบคลุมและเชื่อมโยงกับการทำงานจริงหรือไม่ โดยแบ่งความลึกซึ้งของกระบวนการใน 5 ระดับ",
  dimLevels:["Level 1: มุ่งเน้น \"การมีอยู่\" โดยองค์กรต้องมีการระบุกลุ่มผู้มีส่วนได้ส่วนเสียระดับองค์กรไว้ (แม้จะยังไม่ชัดเจนหรือไม่มีที่มาที่ไปก็ตาม)","Level 2: มุ่งเน้น \"ความชัดเจนและการวิเคราะห์ผ่าน Value Chain\" การระบุกลุ่มผู้มีส่วนได้ส่วนเสียต้องมีที่มาที่ไป โดยวิเคราะห์แบบบูรณาการทั้งจากระดับยุทธศาสตร์องค์กร และจากกรอบห่วงโซ่คุณค่า (Value Chain) ของ \"ทุกสายงาน/ฝ่าย\" พร้อมทั้งต้องมี \"การจัดอันดับความสำคัญ\" อย่างเป็นระบบ","Level 3: มุ่งเน้น \"การอนุมัติและการสื่อสาร\" รายชื่อและกลุ่มผู้มีส่วนได้ส่วนเสียระดับองค์กรที่วิเคราะห์มานั้น จะต้องผ่านความเห็นชอบจาก \"คณะกรรมการรัฐวิสาหกิจ (บอร์ด)\" และต้องถูกถ่ายทอดสื่อสารไปยังผู้บริหาร พนักงานทุกส่วนงาน และหน่วยงานภายนอกที่เกี่ยวข้อง","Level 4: มุ่งเน้น \"ความสอดคล้องและการใช้เทคโนโลยีดิจิทัล\" ผู้มีส่วนได้ส่วนเสียระดับองค์กรต้องสอดคล้องกับระดับสายงาน/ฝ่าย และสอดคล้องกับแผนยุทธศาสตร์ระยะยาว ที่สำคัญคือต้องมี \"ฐานข้อมูลผู้มีส่วนได้ส่วนเสีย (Stakeholder Profile) ที่มีคุณภาพครบถ้วนจัดเก็บอยู่ในระบบดิจิทัล\"","Level 5: มุ่งเน้น \"การเรียนรู้และนวัตกรรม\" มีการทบทวนกระบวนการ (AAR) เพื่อนำไปพัฒนานวัตกรรมด้านการระบุกลุ่มผู้มีส่วนได้ส่วนเสีย และจัดเก็บองค์ความรู้นั้นลงในระบบดิจิทัล"],
  minReqs:{1:["(L1-L2): เอกสารกระบวนการ/ผังขั้นตอน (SIPOC) ในการวิเคราะห์และระบุผู้มีส่วนได้ส่วนเสียขององค์กร"],2:["(L1-L2): เอกสารกระบวนการ/ผังขั้นตอน (SIPOC) ในการวิเคราะห์และระบุผู้มีส่วนได้ส่วนเสียขององค์กร","เอกสารหลักเกณฑ์ในการระบุและจัดอันดับผู้มีส่วนได้ส่วนเสียที่สำคัญ (เช่น หลักเกณฑ์ประเมินอิทธิพลและความสนใจ)","เอกสาร/แบบฟอร์มที่แสดงถึงการวิเคราะห์ผู้มีส่วนได้ส่วนเสีย ตามกรอบ Value Chain ของแต่ละสายงาน/ฝ่าย (เช่น Workshop Stakeholder Profile ที่ครอบคลุมทุกฝ่าย)"],3:["รายงานการประชุมคณะกรรมการรัฐวิสาหกิจ (บอร์ด กทท.) ที่มีมติ \"ให้ความเห็นชอบ\" กลุ่มผู้มีส่วนได้ส่วนเสียขององค์กร","เอกสารหลักฐานการถ่ายทอด/สื่อสารรายชื่อกลุ่มผู้มีส่วนได้ส่วนเสีย ไปยัง \"ผู้บริหารและพนักงานทุกส่วนงาน\"","เอกสารหลักฐานการถ่ายทอด/สื่อสารรายชื่อกลุ่มผู้มีส่วนได้ส่วนเสีย ไปยัง \"หน่วยงานภายนอกที่เกี่ยวข้อง\""],4:["แผนยุทธศาสตร์ด้านผู้มีส่วนได้ส่วนเสียระยะยาว ที่ระบุกลุ่มผู้มีส่วนได้ส่วนเสียระดับองค์กรสอดคล้องกับระดับฝ่าย","ภาพหน้าจอ (Screen Capture) ของ \"ระบบดิจิทัลที่จัดเก็บข้อมูล Stakeholder Profile\" ที่ครบถ้วนทุกกลุ่ม (เช่น ระบบสารสนเทศด้านการตลาด)"],5:["เอกสารแบบบันทึกกระบวนการเรียนรู้และจัดการความรู้ (เช่น แบบบันทึก AAR 2.2 เรื่องกระบวนการระบุผู้มีส่วนได้ส่วนเสีย)","ภาพหน้าจอ (Screen Capture) ของระบบดิจิทัล (เช่น SCM Knowledge Center) ที่แสดงให้เห็นการจัดเก็บองค์ความรู้/นวัตกรรม"]},
  subComps:{4:["รายชื่อ/สถานะ/รูปแบบการทำงาน/ผู้มีอิทธิพล/บริบทอื่นๆ","ประเภทของผู้มีส่วนได้ส่วนเสีย","จุดประสงค์ในการสร้างความสัมพันธ์","ประเด็นที่สำคัญของผู้มีส่วนได้ส่วนเสีย","ระดับความสัมพันธ์ในปัจจุบัน","ระดับความสัมพันธ์ที่คาดหวัง","ความสามารถ/ข้อจำกัดของผู้มีส่วนได้ส่วนเสีย (เช่น ภาษา วัฒนธรรม)"]}},
  {id:"2.3",grp:"2",gname:"วัตถุประสงค์ ขอบเขต และผู้มีส่วนได้ส่วนเสีย",gw:10.0,gs68:4.1,name:"การระบุประเด็นระหว่างผู้มีส่วนได้ส่วนเสียกับองค์กร",w:4.0,s68:4.1,status:"ยังไม่เริ่ม",statusNote:"",
  good:["มีการจัดประชุม Focus Group เพื่อรวบรวมประเด็นและความต้องการของผู้มีส่วนได้ส่วนเสียอย่างเป็นระบบทั้งในระดับองค์กรและระดับสายงาน/ฝ่าย","กทท. มีการศึกษาแนวทางสากลตามมาตรฐาน GRI มาประยุกต์ใช้เพื่อกลั่นกรองประเด็นความคาดหวัง โดยปรับลดประเด็นจาก 24 ประเด็นในปี 2567 มาเป็น 19 ประเด็น","มีการนำเครื่องมือ Materiality Matrix มาใช้ในการจัดลำดับความสำคัญของประเด็น และจำแนกปัจจัยยั่งยืนตามหลัก ESG จนสามารถกรองให้เหลือ 16 ประเด็นหลัก ได้อย่างมีประสิทธิภาพและสอดคล้องกับทิศทางองค์กร","นำข้อมูลประเด็นที่อัปเดตแล้วเข้าสู่ระบบฐานข้อมูลผู้มีส่วนได้ส่วนเสีย (Stakeholder Profile) เพื่อปรับปรุงให้เป็นปัจจุบันเปรียบเทียบก่อนและหลังการทบทวน"],
  results:["ระดับ 1: มีการทำ SIPOC 2.3 กระบวนการระบุประเด็นความต้องการของผู้มีส่วนได้ส่วนเสีย","ระดับ 2: รวบรวมและกลั่นกรองความต้องการจาก 24 ประเด็นเหลือ 19 ประเด็น และจัดทำ Workshop จัดลำดับความสำคัญจนเหลือ 16 ปัจจัยยั่งยืน (ESG)","ระดับ 3: ประเด็นความต้องการผ่านความเห็นชอบจากบอร์ด กทท. (มติฝ่ายบริหาร 13/2568 และมติบอร์ด 9/2568) พร้อมถ่ายทอดสื่อสารผ่านเว็บไซต์และประชุม","ระดับ 4: ผ่านกระบวนการทบทวนด้วย Focus Group (แบบฟอร์ม 3.1 และ 3.2) และมีการทบทวนข้อมูลในระบบสารสนเทศด้านการตลาด (Stakeholder Profile) แบบเปรียบเทียบก่อน-หลัง","ระดับ 5: จัดทำแบบบันทึกการทบทวนหลังการปฏิบัติงาน (AAR 2.3) และนำไปจัดเก็บองค์ความรู้ลงในระบบ SCM Knowledge Center"],
  gaps:["การกำหนด \"ตัวชี้วัดกระบวนการ (Process KPI)\" สำหรับกระบวนการคัดกรองและระบุประเด็นความต้องการยังไม่สมบูรณ์","การพัฒนาผลลัพธ์จากการทบทวน (AAR) ไปสู่การเป็น \"นวัตกรรมกระบวนการ\" รวมถึงขาดการติดตามผลสัมฤทธิ์ของกระบวนการอย่างเป็นระบบ","ผู้ประเมินชื่นชมการจัดการระดับองค์กร แต่ในจุดที่จะก้าวไปสู่ระดับ 5 พบว่า แม้ กทท. จะมีการจัดเก็บ KM ลงระบบดิจิทัลแล้ว แต่ การวิเคราะห์ตัวชี้วัดกระบวนการ (Process KPI) ยังไม่สมบูรณ์ และยังไม่สามารถแสดงรายละเอียดของการนำผลการทบทวนไปปรับปรุงให้เกิดเป็น \"นวัตกรรมกระบวนการ\" ที่มีคุณภาพครบถ้วนได้อย่างเป็นรูปธรรม"],
  actions:["กทท. ต้องกำหนด ตัวชี้วัดกระบวนการ (Process KPI) ในการคัดกรองประเด็นความต้องการให้ชัดเจน และต้องมีการติดตามผลสัมฤทธิ์อย่างเป็นระบบ\n นอกจากนี้ ต้องนำผลจาก AAR มาพัฒนาเป็นนวัตกรรมกระบวนการเพื่อลดขั้นตอน หรือเพิ่มประสิทธิภาพของการเก็บข้อมูลความคาดหวัง","สิ่งเดียวที่กั้น กทท. จากคะแนนเต็ม 5.0000 คือการขาด \"Process KPI\" วัดผลกระบวนการ หากในปี 2569 กทท. ตั้งตัวชี้วัดให้กระบวนการนี้ และเคลมผลลัพธ์ที่ได้ให้เป็น \"นวัตกรรมกระบวนการ\" ได้สำเร็จ การทะยานไปสู่คะแนนเต็มก็ไม่ใช่เรื่องยาก"],
  docs:["รายงานตัวชี้วัดกระบวนการ (Process KPI Report): เอกสารกำหนดตัวชี้วัด ค่าเป้าหมาย และผลการดำเนินงานสำหรับกระบวนการคัดกรองประเด็นความต้องการของผู้มีส่วนได้ส่วนเสีย","หลักฐานนวัตกรรมกระบวนการ: เอกสารสรุปว่าการใช้ Materiality Matrix กรองจาก 24 เหลือ 16 ประเด็นนั้น ก่อให้เกิดเป็น \"นวัตกรรมกระบวนการ\" ที่ลดเวลาหรือทรัพยากรได้อย่างไร พร้อมแนบภาพหน้าจอการจัดเก็บนวัตกรรมนี้ลง SCM Knowledge Center ให้ครบถ้วน"],
  bp:["กทท. ทำได้ดีกว่า รฟม. และ กทพ.: ในหมวดวัตถุประสงค์ ขอบเขต และผู้มีส่วนได้ส่วนเสีย (ซึ่งรวมข้อ 2.3 นี้) กทท. คว้าคะแนนภาพรวมไปได้ถึง 4.1000 คะแนน ซึ่งเอาชนะคู่เทียบอย่าง รฟม. (ได้ 4.0500 คะแนน) และ กทพ. (ได้ 3.8875 คะแนน)"],
  scopeNote:"มิตินี้มุ่งเน้นประเมินความสามารถขององค์กรในการ \"วิเคราะห์และจัดลำดับความสำคัญ\" ของความต้องการและความคาดหวัง (Needs & Expectations) ของผู้มีส่วนได้ส่วนเสีย โดยประเมินความลึกซึ้งใน 5 ระดับ",
  dimLevels:["Level 1: มุ่งเน้น \"การมีอยู่\" องค์กรมีการระบุประเด็น/ความต้องการของผู้มีส่วนได้ส่วนเสียไว้ แต่ยังไม่ชัดเจนหรือไม่มีกระบวนการที่มาที่ไป","Level 2: มุ่งเน้น \"ความชัดเจนและการจัดลำดับ (Prioritization)\" ประเด็นความต้องการต้องมาจากการวิเคราะห์ข้อมูลของ \"ทุกสายงาน/ฝ่าย\" นำมาบูรณาการกับยุทธศาสตร์องค์กร สามารถแยกประเด็นตามกลุ่มผู้มีส่วนได้ส่วนเสียได้อย่างชัดเจน และที่สำคัญคือต้องมี \"การวิเคราะห์และจัดอันดับความสำคัญของประเด็น (Materiality)\" อย่างเป็นระบบ","Level 3: มุ่งเน้น \"การอนุมัติและการสื่อสาร\" ประเด็นความต้องการที่สำคัญระดับองค์กร จะต้องผ่านความเห็นชอบจาก \"คณะกรรมการรัฐวิสาหกิจ (บอร์ด)\" และต้องถ่ายทอดสื่อสารไปยังผู้บริหาร พนักงานทุกส่วนงาน และหน่วยงานภายนอกที่เกี่ยวข้อง","Level 4: มุ่งเน้น \"ความสอดคล้องและการทบทวนในระบบดิจิทัล\" ประเด็นความต้องการระดับองค์กรและระดับฝ่ายต้องสอดคล้องกัน และถูกบรรจุลงในแผนยุทธศาสตร์ระยะยาว ที่สำคัญคือต้องมี \"การทบทวนประเด็นความต้องการใน Stakeholder Profile อย่างสม่ำเสมอ ผ่านระบบดิจิทัล\"","Level 5: มุ่งเน้น \"การเรียนรู้และนวัตกรรม\" มีการทบทวนกระบวนการ (AAR) เพื่อพัฒนานวัตกรรมด้านการระบุประเด็นความต้องการ และจัดเก็บลงในระบบดิจิทัล"],
  minReqs:{1:["(L1-L2): เอกสารกระบวนการ (SIPOC) ในการระบุประเด็น/ความต้องการของผู้มีส่วนได้ส่วนเสีย"],2:["(L1-L2): เอกสารกระบวนการ (SIPOC) ในการระบุประเด็น/ความต้องการของผู้มีส่วนได้ส่วนเสีย","เอกสารหลักเกณฑ์/เครื่องมือในการวิเคราะห์และจัดอันดับความสำคัญของประเด็น (เช่น การใช้ Materiality Matrix)","เอกสารรายงาน/แบบฟอร์มที่แสดงประเด็นความต้องการ โดยแยกตามกลุ่มผู้มีส่วนได้ส่วนเสีย และครอบคลุมทุกสายงาน/ฝ่าย (เช่น Workshop Stakeholder Profile ที่ลดประเด็นจาก 24 เหลือ 16 ปัจจัย ESG)"],3:["รายงานการประชุมคณะกรรมการรัฐวิสาหกิจ (บอร์ด กทท.) ที่มีมติ \"ให้ความเห็นชอบ\" ประเด็น/ความต้องการของผู้มีส่วนได้ส่วนเสียที่สำคัญ","เอกสารหลักฐานการถ่ายทอดสื่อสารประเด็นความต้องการ ไปยัง \"ผู้บริหารและพนักงานทุกส่วนงาน\"","เอกสารหลักฐานการถ่ายทอดสื่อสารประเด็นความต้องการ ไปยัง \"หน่วยงานภายนอกที่เกี่ยวข้อง\""],4:["เอกสาร/แบบฟอร์มที่แสดงความเชื่อมโยง (Alignment) ระหว่างประเด็นความต้องการระดับองค์กร กับ ระดับสายงาน/ฝ่าย","แผนยุทธศาสตร์ด้านผู้มีส่วนได้ส่วนเสียระยะยาว ที่มีการระบุประเด็นความต้องการสอดคล้องกับที่วิเคราะห์ไว้","ภาพหน้าจอ (Screen Capture) ของ \"ระบบดิจิทัล (Stakeholder Profile)\" ที่แสดงให้เห็นว่ามีการ \"เปรียบเทียบข้อมูลก่อน-หลัง\" เพื่อยืนยันว่าระบบมีการอัปเดตทบทวนอย่างสม่ำเสมอ (เช่น ระบบสารสนเทศด้านการตลาด)"],5:["เอกสารแบบบันทึกกระบวนการเรียนรู้และจัดการความรู้ (เช่น แบบบันทึก AAR 2.3)","ภาพหน้าจอระบบดิจิทัล (SCM Knowledge Center) ที่จัดเก็บองค์ความรู้","[เอกสารเพื่อปิด Gap ปี 68] เอกสารที่แสดงการกำหนด Process KPI ในกระบวนการคัดกรองประเด็นความต้องการ และผลลัพธ์ที่เป็นนวัตกรรมกระบวนการ"]},

  {id:"3.1.1",grp:"3.1",gname:"การวางแผนปฏิบัติการ (Planning)",gw:15.0,gs68:2.7,name:"การจัดลำดับความสำคัญของผู้มีส่วนได้ส่วนเสียและประเด็นของผู้มีส่วนได้ส่วนเสีย",w:5.0,s68:2.7,status:"ยังไม่เริ่ม",statusNote:"",
  good:["มีการจัดประชุม Focus Group ตามสายงาน/ฝ่าย เพื่อรับฟังและจัดลำดับความสำคัญของกลุ่มผู้มีส่วนได้ส่วนเสีย รวมถึงประเด็นความต้องการ/ความคาดหวังที่มีต่อสายงาน","กล้าที่จะปรับเปลี่ยนและ ลดประเด็นผู้มีส่วนได้ส่วนเสียจาก 24 ประเด็น เหลือเพียง 16 ประเด็น ซึ่งผลที่ได้คือทำให้การจัดประชุม Focus Group รวดเร็วขึ้น ลดปัญหาในการทำงาน และสายงานสามารถนำข้อมูลไปต่อยอดได้ดีขึ้นอย่างเป็นรูปธรรม","กลุ่มผู้มีส่วนได้ส่วนเสียและประเด็นความต้องการในระดับสายงาน/ฝ่าย มีความสอดคล้องและเชื่อมโยงกับระดับองค์กรอย่างชัดเจน","แผนงานผ่านความเห็นชอบจากผู้บริหารและคณะกรรมการ กทท. และมีการถ่ายทอดสื่อสารลงสู่ผู้ปฏิบัติงานและภายนอกองค์กรอย่างครบถ้วน"],
  results:["ระดับ 1-2: มีการกำหนดระดับและรูปแบบความสัมพันธ์ จัด Focus Group ครอบคลุมสายงาน/ฝ่าย และลดประเด็นความต้องการจาก 24 เหลือ 16 ประเด็น","ระดับ 3: มีมติ คกก. กทท. และ คกก. ฝ่ายบริหาร เห็นชอบนโยบาย แผนยุทธศาสตร์ และแผนปฏิบัติการ และมีการถ่ายทอดสื่อสาร","ระดับ 4: ผลการจัดลำดับความสำคัญและประเด็นความต้องการในระดับฝ่าย มีความสอดคล้องเชื่อมโยงกับระดับองค์กร","ระดับ 5: มีการทำแบบบันทึกทบทวนหลังปฏิบัติงาน (AAR 3.1.1) และนำไปจัดเก็บองค์ความรู้ในระบบ SCM Knowledge Center"],
  gaps:["ขาดการวิเคราะห์รายละเอียดของการปรับปรุงและการพัฒนา \"นวัตกรรมกระบวนการ\" ที่มีคุณภาพครบถ้วนและเป็นระบบ","ยังไม่มีการกำหนด \"ตัวชี้วัดกระบวนการ (Process KPI)\" และ \"ตัวชี้วัดผลลัพธ์ (Outcome KPI)\" ที่มีค่าเป้าหมายชัดเจน สำหรับกระบวนการจัดลำดับความสำคัญ","การจัดเก็บองค์ความรู้และนวัตกรรมลงในระบบดิจิทัลขององค์กรยังไม่ครบถ้วนสมบูรณ์","ผู้ประเมินมองว่า กทท. ทำโครงสร้างการจัดลำดับความสำคัญได้สอดคล้องกันดีมาก (ระดับ 1-4) แต่ในระดับ 5 กทท. ยังขาดการแสดงรายละเอียดที่ชี้ให้เห็นว่า การปรับปรุงกระบวนการนั้นพัฒนาไปสู่ \"นวัตกรรมกระบวนการ\" ได้อย่างไร ผู้ประเมินต้องการเห็นที่มา ผลที่เกิดขึ้น ตัวชี้วัดประสิทธิผล (Process KPI) พร้อมค่าเป้าหมายที่ชัดเจน และต้องการเห็นการนำนวัตกรรมทั้งหมดนี้จัดเก็บลงระบบดิจิทัลอย่างเป็นระบบ"],
  actions:["กทท. ต้องนำผลสำเร็จจากการปรับกระบวนการ (เช่น การลดประเด็นจาก 24 เหลือ 16 ประเด็น และการใช้ Focus Group) มาตั้งเป็น \"ตัวชี้วัดกระบวนการ (Process KPI)\" เช่น การวัดระยะเวลาที่ลดลงในการจัดทำแผน หรือประสิทธิภาพความเข้าใจของฝ่ายงาน และรายงานผลลัพธ์นั้นในฐานะ \"นวัตกรรมกระบวนการ\" พร้อมทั้งต้องจัดเก็บความรู้และนวัตกรรมนี้ลงในระบบดิจิทัลให้สมบูรณ์"],
  docs:["เอกสารรายงาน Process KPI: รายงานที่แสดงตัวชี้วัดกระบวนการ ค่าเป้าหมาย และผลลัพธ์ที่ได้จากการจัดลำดับความสำคัญ (เช่น เวลาที่ลดลง หรือเปอร์เซ็นต์ความผิดพลาดที่ลดลง)","รายงานนวัตกรรมกระบวนการ (Process Innovation Report): เอกสารสรุปการพัฒนานวัตกรรมกระบวนการ ที่อธิบาย As-is สู่ To-be พร้อมแสดงผลประโยชน์ที่ กทท. ได้รับอย่างเป็นรูปธรรม","หลักฐานการจัดเก็บนวัตกรรมลงระบบ: ภาพหน้าจอ (Screen Capture) ของระบบ SCM Knowledge Center ที่แสดงให้เห็นว่า กทท. ได้จัดเก็บทั้ง AAR และ นวัตกรรมกระบวนการ ลงระบบเรียบร้อยแล้ว"],
  bp:["รฟม.: ได้คะแนนภาพรวมข้อ 3.1 ที่ 3.1634 คะแนน ซึ่งในข้อ 3.1.1 รฟม. มีความโดดเด่นในเรื่อง \"การจัดลำดับความสำคัญโดยมีหลักเกณฑ์ที่เป็นมาตรฐาน และมีความสอดคล้องตามบริบทเฉพาะของสายงาน/ฝ่าย อย่างเหมาะสม\" ซึ่งในส่วนนี้ กทท. สามารถเรียนรู้แนวทางการทำหลักเกณฑ์ที่เจาะจงและยืดหยุ่นตามบริบทของแต่ละฝ่ายได้จาก รฟม."],
  scopeNote:"มิตินี้มุ่งเน้นความสามารถในการ \"คัดกรองและจัดลำดับ\" ว่ากลุ่มใด/ประเด็นใดสำคัญที่สุด โดยประเมินคุณภาพเชิงลึกใน 5 ระดับ",
  dimLevels:["Level 1-2: ต้องมีหลักเกณฑ์การจัดลำดับที่เป็นมาตรฐาน และจัดลำดับครบถ้วน \"ทุกสายงาน/ฝ่าย\"","Level 3: ผลการจัดลำดับต้องได้รับ \"ความเห็นชอบจากผู้บริหารสูงสุด\" และต้องนำไปสื่อสารให้พนักงาน/ภายนอกรับทราบ","Level 4: ผลการจัดลำดับระดับฝ่าย ต้อง \"สอดคล้องและเชื่อมโยง\" กับภาพรวมระดับองค์กร","Level 5: มีการทำ AAR ต่อยอดเป็นนวัตกรรมกระบวนการ และจัดเก็บลงระบบดิจิทัล"],
  minReqs:{1:["(L1-L2): เอกสารหลักเกณฑ์/คู่มือ ในการจัดลำดับความสำคัญ","(L1-L2): เอกสารสรุปผลการจัดลำดับกลุ่มผู้มีส่วนได้ส่วนเสียและประเด็นความต้องการ (เช่น ผลจากการทำ Focus Group)"],2:["(L1-L2): เอกสารหลักเกณฑ์/คู่มือ ในการจัดลำดับความสำคัญ","(L1-L2): เอกสารสรุปผลการจัดลำดับกลุ่มผู้มีส่วนได้ส่วนเสียและประเด็นความต้องการ (เช่น ผลจากการทำ Focus Group)"],3:["รายงานการประชุมคณะกรรมการ/ผู้บริหารสูงสุด ที่มีวาระให้ความเห็นชอบกลุ่มและประเด็น","เอกสารหลักฐานการถ่ายทอดสื่อสารผลการจัดลำดับไปยังพนักงานและหน่วยงานภายนอก","เอกสารหลักฐานการถ่ายทอดสื่อสารผลการจัดลำดับไปยังพนักงานและหน่วยงานภายนอก"],4:["เอกสาร/ตารางแสดงความสอดคล้อง (Alignment) ระหว่างกลุ่มและประเด็นของระดับองค์กร กับ ระดับสายงาน/ฝ่าย"],5:["แบบบันทึก AAR กระบวนการจัดลำดับความสำคัญ","ภาพหน้าจอ (Screen Capture) ของระบบดิจิทัล (SCM Knowledge Center) ที่จัดเก็บความรู้/นวัตกรรม"]},

  {id:"3.1.2",grp:"3.1",gname:"การวางแผนปฏิบัติการ (Planning)",gw:15.0,gs68:2.7,name:"การกำหนดระดับของและรูปแบบการสร้างความสัมพันธ์กับผู้มีส่วนได้ส่วนเสีย",w:5.0,s68:2.7,status:"ยังไม่เริ่ม",statusNote:"",
  good:["มีการกำหนดวัตถุประสงค์ ขอบเขต ระดับ (Levels) และรูปแบบ (Methods) ในการสร้างความสัมพันธ์ที่ครอบคลุมทุกกลุ่มผู้มีส่วนได้ส่วนเสียและทุกสายงาน/ฝ่าย","มีการจัดประชุม Focus Group ในแต่ละสายงาน/ฝ่าย เพื่อรับฟังและกำหนดรูปแบบการสร้างความสัมพันธ์ให้ตอบสนองความคาดหวังได้อย่างเหมาะสม","กทท. กล้าที่จะปรับปรุงเกณฑ์การทำงาน โดย ปรับลดระดับการสร้างความสัมพันธ์จาก 10 ระดับ เหลือเพียง 5 ระดับ โดยอิงตามมาตรฐานสากล AA1000SES เพื่อช่วยลดความซับซ้อนและทำให้การบริหารจัดการง่ายขึ้น"],
  results:["ระดับ 1-2: มีกระบวนการและกำหนดระดับ (Levels) และรูปแบบ (Methods) ที่ตอบสนองความคาดหวังครอบคลุมทุกสายงานและทุกกลุ่มผู้มีส่วนได้ส่วนเสีย (มีเอกสาร SIPOC 3.1.2)","ระดับ 3-4: มีการประเมินผ่าน Focus Group (แบบฟอร์มที่ 4: Level & Method และแบบฟอร์มที่ 5: แผนงานส่วนทรัพยากร) แต่ ไม่ได้รับคะแนนในระดับนี้อย่างสมบูรณ์ เนื่องจากขาดหลักฐานการวิเคราะห์ที่แสดงให้เห็นว่ารูปแบบกิจกรรมสอดคล้องกับกรอบอัตรากำลังและขีดความสามารถของฝ่ายอย่างแท้จริง","ระดับ 5: จัดทำแบบบันทึกทบทวนหลังปฏิบัติงาน (AAR 3.1.2) และจัดเก็บใน SCM Knowledge Center แต่ยังขาดการทำนวัตกรรมกระบวนการ"],
  gaps:["การกำหนดรูปแบบการสร้างความสัมพันธ์ (Methods) และระดับ (Levels) ยังไม่ได้นำ \"กรอบอัตรากำลังและขีดความสามารถ (Capacity)\" ของแต่ละสายงาน/ฝ่าย มาวิเคราะห์ประกอบอย่างจริงจัง","ขาดการกำหนด \"ตัวชี้วัดกระบวนการ (Process KPI)\" สำหรับการประเมินการเลือกระดับและรูปแบบกิจกรรม รวมถึงการต่อยอดนำผลการทบทวนไปเป็นนวัตกรรมกระบวนการ","ผู้ประเมินมองว่า กทท. ออกแบบรูปแบบกิจกรรม (Methods) และระดับความสัมพันธ์ (Levels) ได้ดีในระดับโครงสร้างแล้ว แต่จุดที่ทำให้คะแนนหยุดที่ 2.7000 คือ การขาดการวิเคราะห์ให้เห็นว่ารูปแบบการสร้างความสัมพันธ์ที่ฝ่ายต่างๆ เลือกมานั้น \"สอดคล้องและเหมาะสมกับกรอบอัตรากำลังและขีดความสามารถของบุคลากรในฝ่ายตนเองหรือไม่\" (กล่าวง่ายๆ คือ วางรูปแบบกิจกรรมไว้ แต่ไม่ได้เช็กว่ากำลังคนในฝ่ายพอที่จะทำหรือไม่)"],
  actions:["ควรนำระดับการสร้างความสัมพันธ์ที่ กทท. เพิ่งปรับปรุงใหม่ (5 ระดับ ตามเกณฑ์ AA1000SES) ไปบังคับใช้ในการจัดทำแผนปี 2569 ของทุกฝ่ายอย่างเป็นรูปธรรม","ต้องกำหนดให้ทุกสายงาน วิเคราะห์และออกแบบวิธีการสร้างความสัมพันธ์ (Methods) ให้สอดคล้องกับ \"จำนวนอัตรากำลังและทักษะ (Capacity)\" ของฝ่ายตนเอง เป็นปัจจัยหลัก","กทท. ได้คะแนน 2.7000 เพราะทำพื้นฐานได้ดีมากโดยเฉพาะการปรับลดจาก 10 ระดับเหลือ 5 ระดับตามเกณฑ์สากล AA1000SES ทำให้ลดความซ้ำซ้อน แต่สิ่งที่ฉุดคะแนนไว้คือการ \"ลืมเช็กความพร้อมของกำลังคน (Capacity)\" เมื่อเทียบกับรูปแบบกิจกรรมที่จะทำ\nดังนั้น ในปี 2569 กทท. เพียงแค่เพิ่มกระบวนการหรือแบบฟอร์มให้แต่ละฝ่ายวิเคราะห์ทรัพยากรบุคคลควบคู่กับการเลือกรูปแบบกิจกรรม (Method) ให้พอดีตัว และเดินตามรอย Best Practice ของ กทพ. ก็จะสามารถผลักดันคะแนนในข้อนี้ไปสู่ระดับ 4 และ 5 ได้สำเร็จ"],
  docs:["รายงานการวิเคราะห์ขีดความสามารถและอัตรากำลัง (Capacity Analysis Report): เอกสารหรือแบบฟอร์มที่ตอกย้ำให้ผู้ประเมินเห็นการจับคู่ระหว่าง \"รูปแบบกิจกรรม (Method)\" กับ \"ความพร้อมของอัตรากำลังคน/ทักษะของฝ่าย\" (เช่น ถ้ากิจกรรมต้องใช้คน 10 คน ฝ่ายมีคนพอไหม ถ้าไม่พอปรับลดรูปแบบลงมาอย่างไร)","รายงาน Process KPI และหลักฐานการจัดเก็บนวัตกรรม: กำหนดตัวชี้วัดกระบวนการจากการทำ AAR 3.1.2 และแนบภาพหน้าจอการจัดเก็บนวัตกรรมกระบวนการเข้าสู่ระบบ SCM Knowledge Center ให้สมบูรณ์"],
  bp:["กทพ. มีความโดดเด่นในการ \"กำหนดรูปแบบ (Methods) ครอบคลุมทุกประเด็น โดยมีการวิเคราะห์ขีดความสามารถของบุคลากรประกอบการวางแผนอย่างชัดเจน\" ทำให้พวกเขาสามารถบริหารจัดการกำลังคนกับรูปแบบกิจกรรมได้สมดุล"],
  scopeNote:"มิตินี้มุ่งเน้นการ \"จับคู่ (Matching)\" ระหว่างกลุ่มเป้าหมายกับรูปแบบกิจกรรม (Methods) และระดับความสัมพันธ์ (Levels) โดยมีจุดชี้ขาดที่อัตรากำลัง",
  dimLevels:["Level 1-2: กำหนด Levels (เช่น 5 ระดับตาม AA1000SES) และ Methods ครอบคลุม \"ทุกสายงานและทุกกลุ่มผู้มีส่วนได้ส่วนเสีย\"","Level 3: รูปแบบกิจกรรมต้องตอบสนองความคาดหวัง หรือ สอดคล้องกับ \"กรอบอัตรากำลังและขีดความสามารถ\" ของฝ่าย","Level 4: รูปแบบกิจกรรมต้องตอบสนองความคาดหวัง และ สอดคล้องกับ \"กรอบอัตรากำลังและขีดความสามารถ\" ของฝ่าย (ต้องวิเคราะห์ควบคู่กัน)","Level 5: มีการทำ AAR ต่อยอดเป็นนวัตกรรมกระบวนการ และจัดเก็บลงระบบดิจิทัล"],
  minReqs:{1:["(L1-L2): กระบวนการ/หลักเกณฑ์การกำหนดระดับ (Levels) และรูปแบบ (Methods)","(L1-L2): เอกสาร/แบบฟอร์มผลการกำหนดระดับและรูปแบบกิจกรรมของทุกสายงาน"],2:["(L1-L2): กระบวนการ/หลักเกณฑ์การกำหนดระดับ (Levels) และรูปแบบ (Methods)","(L1-L2): เอกสาร/แบบฟอร์มผลการกำหนดระดับและรูปแบบกิจกรรมของทุกสายงาน"],3:["(L3-L4): เอกสารวิเคราะห์ความสอดคล้องของรูปแบบกิจกรรมกับความต้องการของ Stakeholder","(L3-L4): เอกสารวิเคราะห์ความพร้อมทรัพยากร (Capacity Analysis) ที่แสดงว่ารูปแบบกิจกรรมสอดคล้องกับอัตรากำลังคนของสายงาน/ฝ่าย"],4:["(L3-L4): เอกสารวิเคราะห์ความสอดคล้องของรูปแบบกิจกรรมกับความต้องการของ Stakeholder","(L3-L4): เอกสารวิเคราะห์ความพร้อมทรัพยากร (Capacity Analysis) ที่แสดงว่ารูปแบบกิจกรรมสอดคล้องกับอัตรากำลังคนของสายงาน/ฝ่าย"],5:["แบบบันทึก AAR กระบวนการกำหนดระดับและรูปแบบกิจกรรม","ภาพหน้าจอ (Screen Capture) ของระบบดิจิทัล (SCM Knowledge Center) ที่จัดเก็บความรู้/นวัตกรรม"]},
  subComps:{1:["วัตถุประสงค์","ขอบเขต","ระดับ (Levels) ที่คาดหวัง","วิธีการ/รูปแบบ (Methods)"],2:["วัตถุประสงค์","ขอบเขต","ระดับ (Levels) ที่คาดหวัง","วิธีการ/รูปแบบ (Methods)"],3:["วัตถุประสงค์","ขอบเขต","ระดับ (Levels) ที่คาดหวัง","วิธีการ/รูปแบบ (Methods)"],4:["วัตถุประสงค์","ขอบเขต","ระดับ (Levels) ที่คาดหวัง","วิธีการ/รูปแบบ (Methods)"]}},
  {id:"3.1.3",grp:"3.1",gname:"การวางแผนปฏิบัติการ (Planning)",gw:15.0,gs68:2.7,name:"การจัดทำแผนปฏิบัติการประจำปีด้านการสร้างความสัมพันธ์กับผู้มีส่วนได้ส่วนเสีย",w:5.0,s68:2.7,status:"ยังไม่เริ่ม",statusNote:"",
  good:["กทท. มีกระบวนการจัดทำแผนยุทธศาสตร์และการบริหารความสัมพันธ์ระยะยาว (ปี 2569 - 2573) โดยประกอบด้วย 4 ยุทธศาสตร์ และแตกออกเป็น 36 แผนงาน/โครงการ (แบ่งเป็นระดับองค์กร 13 โครงการ และระดับสายงาน/ฝ่ายงาน 23 โครงการ ครอบคลุม 19 สายงาน)","สามารถดำเนินการจัดกิจกรรมตามแผนงานที่กำหนดไว้ได้อย่างครบถ้วนและสำเร็จ 100%","มีการสื่อสารถ่ายทอดแผนยุทธศาสตร์ไปยังหน่วยงานที่รับผิดชอบ รวมถึงมีการ \"เปิดโอกาสให้กลุ่มผู้มีส่วนได้ส่วนเสียรับทราบแผนปฏิบัติการ และแสดงความคิดเห็น\" เพื่อนำข้อมูลมาเป็นปัจจัยนำเข้า (Input) ในการปรับปรุงแผนงาน","มีการสื่อสารกรณีที่เกิดปัญหาอุปสรรคในการปฏิบัติตามแผน และมีการติดตามรายงานผลรายไตรมาส (ไตรมาส 1-4)"],
  results:["ระดับ 1-2: มี SIPOC 3.1.3 และจัดทำแผนปฏิบัติการประจำปีครอบคลุมทุกฝ่าย (23 แผนงานระดับฝ่าย) โดยระบุขั้นตอน ระยะเวลา ผู้รับผิดชอบ และมี KPI ที่สอดคล้องกับภาพรวมองค์กร","ระดับ 3: มีการถ่ายทอดแผนไปยังผู้รับผิดชอบ และมีเอกสารหลักฐาน \"การสื่อสารกรณีที่เกิดปัญหา/อุปสรรคในการปฏิบัติตามแผน\"","ระดับ 4: ถ่ายทอดแผนกับผู้มีส่วนได้ส่วนเสีย (รับ Input) และมีบันทึกแจ้งผลติดตามแผนไตรมาส 1-4 แต่ ยังไม่ได้รับคะแนนเต็มในระดับนี้ เนื่องจากยังไม่มีกระบวนการ \"วิเคราะห์เพื่อปรับเปลี่ยนแผนปฏิบัติการในกรณีจำเป็น\" ที่เป็นมาตรฐานชัดเจน","ระดับ 5: ทำแบบทบทวน AAR 3.1.3 เพิ่มแบบฟอร์มติดตามผล Output/Outcome และจัดเก็บลง SCM Knowledge Center แต่ยังขาดการพัฒนานวัตกรรมกระบวนการ"],
  gaps:["ขาดการกำหนด \"แนวทาง/มาตรฐานที่ชัดเจนในการปรับเปลี่ยนแผนปฏิบัติการในกรณีจำเป็นหรือฉุกเฉิน\" (เช่น นโยบายด่วนจากภาครัฐ หรือข้อสั่งการเร่งด่วน)","ยังขาดการถ่ายทอดเป้าหมายและตัวชี้วัด (KPI) จากแผนปฏิบัติการของหน่วยงาน ลงลึกไปจนถึง \"ระดับบุคคล (Individual KPI)\" อย่างเป็นรูปธรรม","การต่อยอดผลทบทวน AAR ให้กลายเป็น \"นวัตกรรมกระบวนการ\" ที่มี Process KPI รองรับ ยังไม่สมบูรณ์","กทท. จัดทำแผนได้ครอบคลุมดีมาก แต่สิ่งที่ขาดหายไปในข้อนี้คือ \"ความยืดหยุ่นและการตอบสนองต่อสถานการณ์ฉุกเฉิน\" โดยผู้ประเมินระบุ Gap ชัดเจนว่า \"ควรมีการกำหนดแนวทางการดำเนินงานที่ชัดเจน เป็นมาตรฐานเดียวกัน เพื่อปรับเปลี่ยนแผนปฏิบัติการในกรณีจำเป็น (การปรับเปลี่ยนแผนกรณีปกติระหว่างปี, และการปรับเปลี่ยนแผนกรณีเร่งด่วนฉุกเฉิน เช่น นโยบาย ข้อสั่งการ เป็นต้น)\" เพื่อรับประกันว่าท้ายที่สุดผลการดำเนินงานจะยังคงเป็นไปตามเป้าหมาย"],
  actions:["ต้องจัดทำขั้นตอน หรือ Flowchart การปรับเปลี่ยนแผน อย่างเป็นลายลักษณ์อักษรที่ชัดเจน ว่าหากมีเหตุฉุกเฉินหรือนโยบายด่วน ใครจะเป็นผู้อนุมัติ และมีระยะเวลาดำเนินการกี่วัน (Trigger Point)","ต้องติดตามการใช้ทรัพยากรให้สอดคล้องกับแผนฉุกเฉิน (Contingency Plan) ว่ามีบุคลากรและงบประมาณเพียงพอต่อการปรับแผนกะทันหันหรือไม่","กทท. ได้คะแนน 2.7000 ซึ่งถือว่าสอบผ่านฉลุยในแง่ของ \"การทำแผนและการทำตามแผนให้สำเร็จ 100%\" แต่สิ่งที่หยุดคะแนนไม่ให้ไปถึงระดับ 4 และ 5 คือ กทท. ขาด \"แผนสำรองและการปรับตัว (Agility)\" เมื่อต้องเผชิญกับสถานการณ์เร่งด่วน ดังนั้น กุญแจสำคัญในการกวาดคะแนนปี 2569 คือการสร้าง \"Flowchart การปรับแผนฉุกเฉิน\" ให้เป็นมาตรฐาน และดึงเอา Best Practice ของ กทพ. ที่เชื่อมโยงเป้าหมายกิจกรรมลงไปผูกกับ \"KPI รายบุคคล\" มาใช้ เพียงเท่านี้กระบวนการวางแผนก็จะสมบูรณ์แบบไร้รอยโหว่"],
  docs:["คู่มือ/Flowchart กระบวนการปรับเปลี่ยนแผนปฏิบัติการ (Change Management Procedure): เอกสารระบุขั้นตอน สายบังคับบัญชา และเงื่อนไขที่อนุญาตให้ปรับเปลี่ยนแผนงานระหว่างปีได้","หลักฐานการถ่ายทอด KPI ระดับบุคคล (Individual KPI Alignment): เอกสารแสดงให้เห็นว่าแผน SM ของฝ่าย ถูกส่งต่อไปประเมินใน KPI ส่วนบุคคลของพนักงานผู้จัดกิจกรรมนั้นๆ","รายงานนวัตกรรมกระบวนการจากการวางแผน: การกำหนด Process KPI พร้อมภาพหน้าจอการจัดเก็บองค์ความรู้เข้าสู่ระบบ SCM Knowledge Center ให้ครบถ้วน"],
  bp:["กทพ. (การทางพิเศษฯ) ได้สร้าง Best Practice ที่ กทท. ควรนำมาปรับใช้ คือการที่ กทพ. ไม่ได้หยุดแค่การกำหนด KPI ระดับองค์กรหรือระดับฝ่าย แต่มีความโดดเด่นในการ \"สื่อสารและถ่ายทอด KPI / เป้าหมายของหน่วยงาน ลงสู่ระดับบุคคล (Individual KPI)\" ได้อย่างเป็นระบบ ทำให้พนักงานทุกคนรู้ว่าหน้าที่ในการสร้างความสัมพันธ์ของตนเองส่งผลต่อ KPI ของตัวเองและขององค์กรอย่างไร"],
  scopeNote:"มิตินี้มุ่งเน้น \"การแปลงข้อมูลทั้งหมดมาเขียนเป็นแผนงาน\" รวมถึงความยืดหยุ่นในการปรับแผน",
  dimLevels:["Level 1-2: จัดทำแผนปฏิบัติการครบทุกฝ่าย โดยแผนต้องระบุ ขั้นตอน, ระยะเวลา, ผู้รับผิดชอบ, และ KPI ที่สอดคล้องกับองค์กร","Level 3: ต้องถ่ายทอด KPI ของแผนงานลงสู่ \"ระดับบุคคล (Individual KPI)\" และมีการสื่อสารแนวทางกรณีเกิดปัญหาในการทำตามแผน","Level 4: เปิดรับฟัง Input จากผู้มีส่วนได้ส่วนเสียมาทำแผน, มีระบบติดตามผล และที่สำคัญคือ \"มีกระบวนการวิเคราะห์เพื่อปรับเปลี่ยนแผนกรณีจำเป็น (Change Management)\"","Level 5: มีการทำ AAR ต่อยอดเป็นนวัตกรรมกระบวนการ และจัดเก็บลงระบบดิจิทัล"],
  minReqs:{1:["(L1-L2): เล่มแผนปฏิบัติการด้านผู้มีส่วนได้ส่วนเสียประจำปี (ต้องมีระบุ โครงการ, ระยะเวลา, ผู้รับผิดชอบ, KPI)"],2:["(L1-L2): เล่มแผนปฏิบัติการด้านผู้มีส่วนได้ส่วนเสียประจำปี (ต้องมีระบุ โครงการ, ระยะเวลา, ผู้รับผิดชอบ, KPI)"],3:["เอกสารหลักฐานการถ่ายทอด KPI ของแผนงานลงสู่การประเมินผลระดับบุคคล (Individual KPI)","เอกสารหลักฐานการสื่อสาร/ซักซ้อมความเข้าใจ ในกรณีที่เกิดปัญหาอุปสรรคในการปฏิบัติตามแผน"],4:["เอกสารแสดงการเปิดรับฟังความคิดเห็นจาก Stakeholder เพื่อนำมาเป็น Input ปรับปรุงแผน","รายงานการติดตามผลการปฏิบัติตามแผน (เช่น รายงานผลรายไตรมาส)","คู่มือ/กระบวนการ/Flowchart ที่ระบุขั้นตอนมาตรฐานในการ \"ปรับเปลี่ยนแผนปฏิบัติการกรณีจำเป็น/ฉุกเฉิน\""],5:["แบบบันทึก AAR กระบวนการจัดทำแผนปฏิบัติการ","ภาพหน้าจอ (Screen Capture) ของระบบดิจิทัล (SCM Knowledge Center) ที่จัดเก็บความรู้/นวัตกรรม"]},
  subComps:{2:["ขั้นตอน","ระยะเวลา","ผู้รับผิดชอบ","KPI ที่มีค่าเป้าหมาย สอดคล้องกับภาพรวมองค์กร"]}},
  {id:"3.2.1",grp:"3.2",gname:"การสร้างความพร้อม (Preparing)",gw:10.0,gs68:2.7,name:"การยกระดับความสามารถในการสร้างความสัมพันธ์กับผู้มีส่วนได้ส่วนเสีย",w:5.0,s68:2.7,status:"ยังไม่เริ่ม",statusNote:"",
  good:["มีการจัดประชุม Focus Group เพื่อวิเคราะห์ความพร้อมและระบุทรัพยากร (งบประมาณ บุคลากร IT) ที่ต้องใช้ในแต่ละแผนงานอย่างเป็นระบบ","มีการวิเคราะห์หาช่องว่าง (Gap) ได้จริงเชิงประจักษ์: พบว่ามี 1 แผนงาน (แผนสัมมนาชุมชน ทลฉ.) มีความเสี่ยงด้านบุคลากรไม่เพียงพอในการจัดงาน ฝพต. จึงได้แก้ปัญหาโดยจัดทำบันทึกรายงานแนวทางปิดช่องว่างไปยังหน่วยงานที่เกี่ยวข้อง (ฝง., ฝบ.) เพื่อขอความร่วมมือและเพิ่มอัตรากำลัง","มีการบรรจุแผนงาน \"การพัฒนาทักษะการจัดการและบริหารผู้มีส่วนได้ส่วนเสีย\" เข้าไปในแผนปฏิบัติการ เพื่อยกระดับ Capacity ของพนักงาน"],
  results:["ระดับ 1-2: ส่งเอกสาร SIPOC 3.2.1 และตารางสรุปแผนสร้างความสัมพันธ์ที่วิเคราะห์ทรัพยากร (แบบฟอร์มที่ 5 ส่วนที่ 2) ผ่านการทำ Focus Group","ระดับ 3: ส่งรายงานแนวทางการปิดลดช่องว่าง (Gap) สำหรับหน่วยงานที่คนไม่พอ (เช่น บันทึกถึง ฝง., ฝบ.)","ระดับ 4: ส่งบันทึกแจ้งรายงานผลการติดตามไตรมาส 1-4 ที่แสดงให้เห็นการจัดสรรทรัพยากรและยกระดับทักษะบุคลากร","ระดับ 5: ทำ AAR 3.2.1 สรุปแนวทางแก้ปัญหาคนไม่พอ และนำไปจัดเก็บใน SCM Knowledge Center"],
  gaps:["ขาดการ \"ติดตามและประเมินความเพียงพอของทรัพยากรอย่างต่อเนื่อง\" ในระหว่างการดำเนินงาน (ระหว่างปี) เพื่อไม่ให้กระทบต่อการจัดกิจกรรม","แบบฟอร์มการวิเคราะห์ความพร้อมด้านทรัพยากร (งบ/คน/IT) ในระดับฝ่ายงาน ยังต้องทำให้เป็นระบบมาตรฐานเดียวกันที่เข้มข้นขึ้น","ยังไม่ได้นำความสำเร็จจากการบริหาร/ขอเพิ่มทรัพยากร มาตั้ง Process KPI และยกระดับเป็น \"นวัตกรรมกระบวนการ\" อย่างเป็นรูปธรรม","กทท. ได้คะแนน 2.7000 แปลว่าสอบผ่าน Level 1 และ 2 ได้เต็ม (2.0000) เพราะระบุทรัพยากรได้ครบทุกฝ่าย และได้เศษ 0.7000 จาก Level 3-5 ผู้ประเมินให้คะแนนความพยายามในการเจอ Gap (เคสคนไม่พอที่ ทลฉ.) แต่หักคะแนนส่วนที่เหลือเพราะ ยังขาดการติดตามและประเมินความเพียงพอของทรัพยากรในภาพรวมตลอดทั้งปีอย่างเป็นระบบ นอกจากนี้ การนำ AAR ไปจัดเก็บในระบบยังขาด Process KPI และยังไม่ถึงขั้นเป็น \"นวัตกรรมกระบวนการ\" ที่สามารถลดต้นทุน/เวลาให้กับองค์กรได้จริง"],
  actions:["ต้อง ติดตามและประเมินความเพียงพอของทรัพยากรในการดำเนินงานตามแผนอย่างต่อเนื่อง (รายไตรมาส) เพื่อเตรียมพร้อมและบริหารจัดการล่วงหน้าไม่ให้กระทบต่อการจัดกิจกรรม","จัดทำ แบบฟอร์มวิเคราะห์ทรัพยากร (งบ/คน/IT) สำหรับการจัดทำแผนของทุกฝ่าย ให้เป็นมาตรฐานเดียวกันอย่างเป็นระบบ"],
  docs:["รายงานติดตามความเพียงพอของทรัพยากร (Resource & Capacity Monitoring Report): เอกสารรายงานผลรายไตรมาสที่แสดงให้เห็นว่า กทท. ไม่ได้ประเมินทรัพยากรแค่ตอนต้นปี แต่มีการมอนิเตอร์ระหว่างปีด้วยว่า งบ/คน ยังพอจัดกิจกรรมที่เหลือหรือไม่","รายงาน Process KPI และนวัตกรรมกระบวนการ: กำหนดตัวชี้วัดกระบวนการจัดหาทรัพยากร (เช่น ระยะเวลาอนุมัติลดลงกี่วัน) และนำไปสร้างเป็น Process Innovation พร้อมแนบภาพหน้าจอ SCM Knowledge Center ที่สมบูรณ์"],
  bp:["รฟม. เป็น Best Practice เพราะสามารถ \"ระบุทรัพยากรและความสามารถ ครอบคลุมทุกสายงานอย่างชัดเจนและเป็นระบบ\" รวมทั้งมีการใช้แบบฟอร์มที่เป็นมาตรฐานบังคับให้ทุกสายงานวิเคราะห์คนและงบประมาณอย่างละเอียดตั้งแต่ต้น ทำให้ผู้ตรวจเห็นภาพรวมขององค์กรชัดเจนกว่า กทท. สามารถนำแนวทางการออกแบบแบบฟอร์มวิเคราะห์ทรัพยากรของ รฟม. มาปรับใช้ให้ทุกฝ่ายกรอกข้อมูลได้อย่างมีประสิทธิภาพมากขึ้น"],
  scopeNote:"มิตินี้มุ่งเน้นการประเมินว่าองค์กรมีการจัดเตรียม \"คน งบประมาณ และเครื่องมือ (Resources & Capacity)\" ให้พร้อมและเพียงพอก่อนที่จะลงมือจัดกิจกรรมสร้างความสัมพันธ์หรือไม่ โดยแบ่งความลึกซึ้งเป็น 5 ระดับ",
  dimLevels:["Level 1-2: ต้องมีการระบุทรัพยากร (Resources) และความสามารถ (Capacity) ที่จำเป็นต้องใช้อย่างชัดเจนและเป็นระบบ โดยต้องครอบคลุม \"ทุกสายงาน/ฝ่าย\"","Level 3: ต้องมีการวิเคราะห์เพื่อหา \"ช่องว่าง (Gap)\" ของทรัพยากร (เช่น คนไม่พอ งบไม่พอ) และกำหนดแนวทางปิดช่องว่างนั้นทั้งระยะสั้นและระยะยาว","Level 4: สามารถปิด/ลดช่องว่างทรัพยากรได้ตามเป้าหมาย และทรัพยากรที่ขอเพิ่มนั้นถูกบรรจุ/อนุมัติลงในแผนปฏิบัติการประจำปี","Level 5: มีการทำ AAR ต่อยอดเป็นนวัตกรรมกระบวนการในการจัดหา/บริหารทรัพยากร และจัดเก็บลงระบบดิจิทัล"],
  minReqs:{1:["(L1-L2): เอกสารหลักเกณฑ์/แนวทาง หรือแบบฟอร์มการระบุทรัพยากรและความสามารถ (เช่น แบบฟอร์ม 5 ส่วนที่ 2 ทรัพยากรที่ใช้)"],2:["(L1-L2): เอกสารหลักเกณฑ์/แนวทาง หรือแบบฟอร์มการระบุทรัพยากรและความสามารถ (เช่น แบบฟอร์ม 5 ส่วนที่ 2 ทรัพยากรที่ใช้)"],3:["รายงานการวิเคราะห์ความเพียงพอ และแนวทางการปิด/ลดช่องว่าง (Gap) ของทรัพยากร"],4:["รายงานผลการดำเนินงานและเอกสารติดตามผลการจัดหาทรัพยากรตามแผนปฏิบัติการ"],5:["แบบบันทึก AAR กระบวนการระบุทรัพยากร และภาพหน้าจอระบบ SCM Knowledge Center"]},

  {id:"3.2.2",grp:"3.2",gname:"การสร้างความพร้อม (Preparing)",gw:10.0,gs68:2.7,name:"การระบุและเตรียมความพร้อมการจัดการความเสี่ยงในการสร้างความสัมพันธ์กับผู้มีส่วนได้ส่วนเสีย",w:5.0,s68:2.7,status:"ยังไม่เริ่ม",statusNote:"",
  good:["มีกระบวนการระบุและประเมินความเสี่ยงอย่างเป็นระบบ (SIPOC 3.2.2) โดยนำไปจัดทำแผนรองรับสถานการณ์ฉุกเฉิน เพื่อให้หน่วยงานดำเนินการได้ตามกรอบเวลา","มีการสร้างเครื่องมือวิเคราะห์ความเสี่ยงผ่าน \"แบบฟอร์มที่ 5 ส่วนที่ 3 (การประเมินและวิเคราะห์ความเสี่ยง)\" และนำไปเขียนแผนฉุกเฉินใน \"แบบฟอร์มที่ 6 (แผนรองรับสถานการณ์ฉุกเฉิน - Contingency Plans)\"","มีการนำความเสี่ยงที่พบจริงเชิงประจักษ์ (เช่น กรณีการสัมมนาชุมชน ทลฉ. ที่พบความเสี่ยงด้านอัตรากำลังบุคลากรไม่เพียงพอ) มาแก้ไขปัญหาและจัดทำเป็นแผนลดช่องว่างทรัพยากร และทำเป็นแผนฉุกเฉินได้สำเร็จ"],
  results:["ระดับ 1-2: ส่งเอกสาร SIPOC 3.2.2 และแบบฟอร์มที่ 6 แผนรองรับสถานการณ์ฉุกเฉิน","ระดับ 3: ส่งแบบฟอร์มที่ 6 แผนรองรับสถานการณ์ฉุกเฉิน, เอกสาร PAT_Risk_Contingency และ Workshop Stakeholder Profile","ระดับ 4: ส่งรายงานแนวทางลดช่องว่างทรัพยากร (ฝง., ฝบ.) ควบคู่กับแบบฟอร์มที่ 6","ระดับ 5: ทำ AAR 3.2.2 และนำจัดเก็บในระบบ SCM Knowledge Center"],
  gaps:["แบบฟอร์มการประเมินความเสี่ยง (Risk Profile) ยังไม่ได้แยกมิติความเสี่ยงออกเป็น 2 มิติอย่างชัดเจน ตามที่เกณฑ์บังคับ (มิติกระทบ Stakeholder และ มิติกระทบองค์กร)","ยังไม่พบการนำผลประเมินความเสี่ยงไปจัดทำแผนรองรับสถานการณ์ฉุกเฉิน (Contingency Plan) ทั้งระยะสั้นและระยะยาวอย่างครบถ้วนสมบูรณ์แบบ","ขาดการกำหนดตัวชี้วัดกระบวนการ (Process KPI) จากการทำ AAR เพื่อยกระดับเป็นนวัตกรรมกระบวนการ","กทท. ได้คะแนนมาที่ 2.7000 ซึ่งเป็นผลมาจากการ \"ตกม้าตายที่แบบฟอร์ม\" ผู้ตรวจประเมินลงความเห็นในช่วง Site Visit อย่างชัดเจนว่า \"แบบฟอร์มการประเมินความเสี่ยงควรแยกมิติความเสี่ยงออกเป็น 2 บรรทัดให้ชัดเจนตามเกณฑ์ คือ 1) ความเสี่ยงที่ผลลัพธ์จะไม่ตอบสนองผู้มีส่วนได้ส่วนเสีย และ 2) ความเสี่ยงที่ผลลัพธ์จะไม่ตอบสนององค์กร\" ดังนั้น เมื่อ กทท. ประเมินความเสี่ยงแบบรวมๆ (ไม่ได้แยก 2 มิตินี้ให้ผู้ตรวจเห็นในกระดาษ) ทำให้คะแนนความสมบูรณ์ใน Level 2 และ 3 ถูกหักออกไป ส่งผลให้ได้มาเพียงเศษ 0.7000 แม้ว่าในทางปฏิบัติ กทท. จะมีแผนฉุกเฉินแก้ปัญหาคนไม่พอแล้วก็ตาม"],
  actions:["ต้อง \"ปรับปรุงแบบฟอร์ม Risk Profile (แบบฟอร์มที่ 5 ส่วนที่ 3 และแบบฟอร์มที่ 6)\" โดยบังคับให้ทุกฝ่ายแยกการประเมินความเสี่ยงออกเป็น 2 มิติอย่างเด็ดขาด (มิติต่อ กทท. และ มิติต่อ Stakeholder)","ต้องนำผลการประเมินแบบ 2 มิตินี้ ไปจัดทำแผนรองรับสถานการณ์ฉุกเฉิน (Contingency Plan) ให้สอดรับกันอย่างครบถ้วน","แม้ กทท. จะมีการทำแผนรับมือฉุกเฉินและแก้ปัญหาหน้างานได้จริง (จนได้คะแนน 2.7000) แต่การที่ \"แบบฟอร์มไม่ได้แยก 2 มิติ ตามที่เกณฑ์เขียนบังคับไว้เป๊ะๆ\" ทำให้พลาดคะแนนระดับ 4 และ 5 ไปอย่างน่าเสียดาย ดังนั้น ในปี 2569 ถือเป็นเรื่อง \"Quick Win\" ที่แก้ง่ายที่สุด เพียงแค่ ปรับแก้แบบฟอร์มให้มี 2 บรรทัดแยกมิติความเสี่ยงให้ชัดเจน เดินตามรอย Best Practice ของ กทพ. คะแนนในหัวข้อนี้จะพุ่งทะลุกำแพง 3.0000 ไปได้อย่างแน่นอน"],
  docs:["แบบฟอร์ม Risk Profile ฉบับปรับปรุง (2 Dimensions Risk Assessment): เอกสารที่มีการตีเส้นแบ่งแยกบรรทัดชัดเจนระหว่าง \"ความเสี่ยงที่ผลลัพธ์จะไม่ตอบสนองผู้มีส่วนได้ส่วนเสีย\" และ \"ความเสี่ยงที่ผลลัพธ์จะไม่ตอบสนอง กทท.\"","รายงานแผนฉุกเฉินแบบแยกมิติ (Aligned Contingency Plan): แผนที่ระบุว่าหากเกิดความเสี่ยงในมิติที่ 1 จะแก้ไขอย่างไร และถ้าเกิดในมิติที่ 2 จะแก้ไขอย่างไร","รายงาน Process KPI และการจัดเก็บ KM: กำหนดตัวชี้วัดกระบวนการการทำแผนความเสี่ยงนี้ และเก็บลงระบบดิจิทัลให้ครบถ้วน"],
  bp:["การทางพิเศษแห่งประเทศไทย (กทพ.) คือ Best Practice ที่ กทท. ต้องนำมาปรับใช้ เพราะใน Feedback Report ระบุไว้ชัดเจนว่า กทพ. มีความโดดเด่นในเรื่อง \"การระบุความเสี่ยง 2 มิติครบถ้วน ทั้งมิติที่กระทบ Stakeholder และมิติที่กระทบองค์กร\" ซึ่งตอบโจทย์ Minimum Requirement และมิติการประเมินของ TRIS แบบตรงเป๊ะไร้ข้อกังขา"],
  scopeNote:"มิตินี้มุ่งเน้นประเมินว่าองค์กรมีการวิเคราะห์ \"ความเสี่ยง\" ก่อนลงมือสร้างความสัมพันธ์หรือไม่ และมี \"แผนสำรองฉุกเฉิน\" เตรียมไว้หรือเปล่า โดยประเมินความลึกซึ้งใน 5 ระดับ",
  dimLevels:["Level 1-2: ต้องมีการระบุความเสี่ยงของการสร้างความสัมพันธ์อย่างชัดเจนและเป็นระบบ โดย \"บังคับให้ต้องวิเคราะห์แยกเป็น 2 มิติ\" ได้แก่ 1) ความเสี่ยงที่ผลลัพธ์จะไม่ตอบสนองความต้องการของผู้มีส่วนได้ส่วนเสีย และ 2) ความเสี่ยงที่ผลลัพธ์จะไม่ตอบสนองเป้าหมายขององค์กร","Level 3: นำผลการประเมินความเสี่ยงมาจัดทำ \"แผนรองรับสถานการณ์ฉุกเฉิน (Contingency Plans)\"","Level 4: นำกรอบความเสี่ยงไปปฏิบัติจริง และสามารถบริหารความเสี่ยงได้ครบถ้วน บรรลุตามเป้าหมาย Output/Outcome ประจำปี","Level 5: มีการทำ AAR ต่อยอดเป็นนวัตกรรมกระบวนการบริหารความเสี่ยงด้านผู้มีส่วนได้ส่วนเสีย และจัดเก็บลงระบบดิจิทัล"],
  minReqs:{1:["(L1-L2): เอกสาร/แนวทาง/กระบวนการในการระบุความเสี่ยงของการสร้างความสัมพันธ์"],2:["(L1-L2): เอกสาร/แนวทาง/กระบวนการในการระบุความเสี่ยงของการสร้างความสัมพันธ์"],3:["แผนบริหารความเสี่ยง หรือ แผนรองรับสถานการณ์ฉุกเฉิน (Contingency Plans) ในการสร้างความสัมพันธ์"],4:["รายงานผลการดำเนินงานตามแผนการบริหารจัดการผู้มีส่วนได้ส่วนเสีย (ที่แสดงว่าบริหารความเสี่ยงได้ตามเป้า)"],5:["แบบบันทึก AAR กระบวนการจัดการความเสี่ยง และภาพหน้าจอระบบ SCM Knowledge Center"]},
  subComps:{2:["มิติความเสี่ยงที่ผลลัพธ์ไม่ตอบสนองความต้องการของ \"ผู้มีส่วนได้ส่วนเสีย\"","มิติความเสี่ยงที่ผลลัพธ์ไม่ตอบสนองความต้องการของ \"รัฐวิสาหกิจ (องค์กร)\""]}},
  {id:"3.3.1",grp:"3.3",gname:"การติดตามและรายงานผล (Monitoring and Reporting)",gw:10.0,gs68:2.7,name:"การติดตามและประเมินผลตามแผนปฏิบัติการ",w:3.0,s68:2.7,status:"ยังไม่เริ่ม",statusNote:"",
  good:["มีกระบวนการติดตาม รายงาน และประเมินผล ตามแผนการสร้างความสัมพันธ์อย่างเป็นระบบ (SIPOC 3.3.1) ครอบคลุมทุกกลุ่มผู้มีส่วนได้ส่วนเสีย","มีการจัดทำรายงานและบันทึกแจ้งผลการติดตามการดำเนินงานเพื่อการบริหารจัดการผู้มีส่วนได้ส่วนเสียเป็นรายไตรมาส (ไตรมาส 1-4) โดยระบุ KPI เป้าหมาย ความถี่ และผู้รับผิดชอบอย่างชัดเจน","มีการนำผลการประเมินในกิจกรรมของแผน SM มาใช้เป็นปัจจัยนำเข้า (Input) ในกระบวนการทบทวนและจัดทำแผนยุทธศาสตร์องค์กรในปีถัดไป"],
  results:["ระดับ 1-2: ส่งเอกสาร SIPOC 3.3.1 และบันทึกแจ้งการรายงานและผลการติดตามไตรมาส 1-4 ครอบคลุมทุกแผนของสายงาน","ระดับ 3: ส่งมติคณะกรรมการ กทท. รับทราบผลการดำเนินงานไตรมาส 1-3 (ไตรมาส 4 อยู่ระหว่างดำเนินการเข้าบอร์ด)","ระดับ 4: ส่งรายงานผลการติดตามไตรมาส 1-4 และเอกสารแผนยุทธศาสตร์ที่แสดงการนำผลประเมินไปเป็นปัจจัยนำเข้า (Input)","ระดับ 5: ทำแบบบันทึก AAR 3.3.1 และภาพหน้าจอจัดเก็บในระบบ SCM Knowledge Center"],
  gaps:["การรายงานผลการประเมินระดับฝ่าย ยังขาด \"การวิเคราะห์เทียบเคียงผลประเมินกับเป้าหมายยุทธศาสตร์ระดับองค์กร\" อย่างเป็นรูปธรรม","ขาดการประเมินวิเคราะห์เชิงลึกว่า การดำเนินการตามแผนสร้างความสัมพันธ์นั้น \"ส่งผลต่อการสร้างมูลค่าเพิ่ม (Value Creation) ขององค์กรอย่างไร\"","การพัฒนาผลจากการทำ AAR ไปสู่การเป็นนวัตกรรมกระบวนการติดตามผล ที่มีตัวชี้วัดประสิทธิผล (Process KPI) ที่ชัดเจน","กทท. ได้คะแนนในข้อนี้ 2.7000 คะแนน เนื่องจากผ่าน Minimum Requirement และมิติในระดับ 1 และ 2 ครบถ้วน (ได้ 2.0000) แต่ในระดับ 3-5 ได้มาเพียง 0.7000 เนื่องจากเอกสารรายงานผลไตรมาส 4 ยังไม่ผ่านบอร์ด ณ วันที่ตรวจประเมิน รวมถึงผู้ตรวจมองว่า \"รายงานการติดตามผลยังขาดการประเมินเชิงลึก\" กทท. ติดตามแค่ว่ากิจกรรมเสร็จตาม KPI หรือไม่ แต่ไม่ได้ประเมินว่ากิจกรรมนั้นส่งผลต่อ Value ขององค์กรอย่างไร\n รวมถึงยังไม่ได้สร้าง Process KPI สำหรับนวัตกรรมในระดับ 5"],
  actions:["ต้อง วิเคราะห์ความเชื่อมโยง ว่าผลลัพธ์ของกิจกรรมการสร้างความสัมพันธ์ (ระดับฝ่าย) สามารถส่งผลดีต่อภาพลักษณ์ หรือเป้าหมายหลักของ กทท. (ระดับองค์กร) ได้อย่างไร","เชื่อมโยงผลประเมินจากแผนปฏิบัติการ เข้ากับ \"ตัวชี้วัดความพึงพอใจและภาพลักษณ์องค์กร\" ในระดับยุทธศาสตร์ให้ชัดเจน","กทท. มีวินัยในการติดตามผลและรายงานไตรมาส 1-4 ได้ดีมากจนคว้าคะแนน 2.7000 มาได้สำเร็จ แต่จุดที่ทำให้คะแนนชะงักคือ \"ความลึกของการประเมิน\" ผู้ตรวจไม่อยากเห็นแค่รายงานว่า \"จัดสัมมนาเสร็จแล้ว 100%\" แต่อยากเห็นบทวิเคราะห์ว่า \"จัดสัมมนาแล้ว กทท. ได้ Value อะไรกลับมา\" ดังนั้น ปี 2569 แค่เพิ่มช่อง \"ผลกระทบต่อองค์กร\" เข้าไปในแบบฟอร์มรายงานผลไตรมาส ก็จะสามารถอุด Gap ข้อนี้และดันคะแนนทะลุ 3.0000 ได้สบายๆ "],
  docs:["รายงานการติดตามและประเมินผลเชิงวิเคราะห์ (Value Creation Evaluation Report): แบบฟอร์มติดตามผลที่เพิ่มช่อง \"ผลกระทบต่อเป้าหมายองค์กร/Value Creation\" เพื่อบังคับให้ทุกฝ่ายประเมินว่ากิจกรรมที่จัดไปนั้นช่วยสร้างมูลค่าเพิ่ม (เช่น ลดข้อร้องเรียน หรือสร้างรายได้) ให้องค์กรอย่างไร","มติบอร์ดรับทราบผลไตรมาส 4: ต้องเร่งรัดกระบวนการนำเสนอผลการดำเนินงานไตรมาส 4 ให้ผ่านความเห็นชอบจากคณะกรรมการ กทท. ให้ครบถ้วนสมบูรณ์","รายงาน Process KPI สำหรับการติดตามผล: ตั้งตัวชี้วัดของการทำ AAR (เช่น ลดเวลาการทำรายงาน) และจัดเก็บนวัตกรรมนี้ลง SCM Knowledge Center"],
  bp:["รฟม. มีความโดดเด่นในการ \"กำหนด KPI/เป้าหมาย ความถี่ ผู้รับผิดชอบในการติดตามประเมินผลได้อย่างชัดเจนเป็นระบบ\" และนำระบบเทคโนโลยีสารสนเทศมาใช้ติดตามผลเชื่อมโยงตัวชี้วัดระดับกลยุทธ์กับแผนปฏิบัติงานได้อย่างไร้รอยต่อ กทท. สามารถศึกษาแนวทางการนำระบบดิจิทัลมาจับตัวชี้วัดแบบ Real-time จาก รฟม. เพื่อเสริมความแข็งแกร่งในข้อนี้"],
  scopeNote:"มิตินี้มุ่งเน้นประเมินว่าองค์กรมีระบบติดตามว่ากิจกรรมที่ทำไปนั้นได้ผลตามที่วางแผนไว้หรือไม่ และผลลัพธ์นั้นส่งผลดีต่อภาพรวมองค์กรอย่างไร โดยประเมินความลึกซึ้งใน 5 ระดับ",
  dimLevels:["Level 1-2: มีกระบวนการติดตามประเมินผลที่ชัดเจน ครอบคลุมทุกแผนของสายงาน โดยระบุตัวชี้วัด (KPI)/เป้าหมาย ความถี่ และผู้รับผิดชอบ และมีแนวทางเทียบผลกับเป้าหมายระดับองค์กร","Level 3: จัดทำรายงานติดตามผลครบถ้วนตามแนวทาง และนำเสนอต่อคณะกรรมการรัฐวิสาหกิจ (บอร์ด) ให้ความเห็นชอบหรือรับทราบ","Level 4: ผลการดำเนินงานบรรลุเป้าหมายตามแผนทั้ง Output และ Outcome และมีการนำผลติดตามไปเป็น \"ปัจจัยนำเข้า (Input)\" สำหรับปรับปรุงยุทธศาสตร์ในปีถัดไป","Level 5: มีการทำ AAR ต่อยอดเป็นนวัตกรรมกระบวนการติดตามและประเมินผล และจัดเก็บลงระบบดิจิทัล"],
  minReqs:{1:["(L1-L2): เอกสารแนวทาง/คู่มือในการติดตามและประเมินผล (เช่น SIPOC 3.3.1)"],2:["(L1-L2): เอกสารแนวทาง/คู่มือในการติดตามและประเมินผล (เช่น SIPOC 3.3.1)","(L2-L3): รายงานผลการปฏิบัติตามแผนงานสร้างความสัมพันธ์ฯ ประจำปี/รายไตรมาส"],3:["(L2-L3): รายงานผลการปฏิบัติตามแผนงานสร้างความสัมพันธ์ฯ ประจำปี/รายไตรมาส","รายงานการประชุมคณะกรรมการรัฐวิสาหกิจ หรืออนุกรรมการฯ ที่รับทราบ/เห็นชอบผลการดำเนินงาน"],4:["เอกสารแสดงการนำผลประเมินไปทบทวนกระบวนการจัดทำยุทธศาสตร์ด้านผู้มีส่วนได้ส่วนเสีย"],5:["แบบบันทึก AAR กระบวนการติดตามประเมินผล และภาพหน้าจอระบบ SCM Knowledge Center"]},
  subComps:{2:["KPI/เป้าหมาย","ความถี่ในการติดตาม","ผู้รับผิดชอบในการติดตามและประเมินผล"]}},
  {id:"3.3.2",grp:"3.3",gname:"การติดตามและรายงานผล (Monitoring and Reporting)",gw:10.0,gs68:2.7,name:"การรายงานผล",w:3.0,s68:2.7,status:"ยังไม่เริ่ม",statusNote:"",
  good:["มีการจัดทำและเปิดเผยรายงานประจำปี 2567 โดยมีหัวข้อการมุ่งเน้นผู้มีส่วนได้ส่วนเสียและลูกค้าอย่างชัดเจน แยกตามฝ่ายงาน (ทกท., ทลฉ., ทชส. และ ทรน.)","มีการส่งมอบรายงานผ่านช่องทางที่หลากหลาย ทั้งรูปแบบ PDF, E-book บนเว็บไซต์ และจัดส่งทางไปรษณีย์ให้กับหน่วยงานภายนอก","สร้างผลงานโดดเด่นใน Level 4: กทท. มีการสำรวจความพึงพอใจต่อ \"รายงานผลการดำเนินงานด้านผู้มีส่วนได้ส่วนเสีย\" เป็นครั้งแรก และสามารถทำคะแนนได้สูงถึง 4.36 คะแนน (ทะลุเป้าหมายที่ตั้งไว้ที่ 4.00 คะแนน)"],
  results:["ระดับ 1: ส่งเอกสาร SIPOC 3.3.2 แนวทางการรายงานผลต่อสาธารณชน","ระดับ 2-3: ส่งรายงานประจำปี 2567 (ด้านการมุ่งเน้นผู้มีส่วนได้ส่วนเสีย) และเอกสารการสื่อสารแผนผ่านเว็บไซต์ กทท.","ระดับ 4: ส่งรายงานผลสำรวจความพึงพอใจต่อรายงานประจำปี 2567 (ส่วนที่ 4 ความพึงพอใจต่อผลการดำเนินงานการสร้างความสัมพันธ์)","ระดับ 5: ทำแบบบันทึก AAR 3.3.2 และจัดเก็บข้อมูลเข้าสู่ SCM Knowledge Center"],
  gaps:["ขาดการกำหนดเป้าหมายและการสำรวจความพึงพอใจต่อรายงาน SCM ใน \"ทุกช่องทาง\" ที่ใช้เผยแพร่ (เช่น เผยแพร่ทางเว็บ ทางโซเชียลมีเดีย แต่ไม่ได้แยกประเมินความพึงพอใจของผู้อ่านในช่องทางนั้นๆ อย่างชัดเจน)","ขาดการวิเคราะห์ตัวชี้วัดกระบวนการ (Process KPI) จากการทำ AAR เพื่อยกระดับเป็นนวัตกรรมการรายงานผล","กทท. ได้คะแนนในข้อนี้มาที่ 2.7000 ซึ่งหมายถึงสอบผ่านโครงสร้างการทำรายงาน (L1-L2) อย่างสมบูรณ์ แต่ไปโดนหักคะแนนความสมบูรณ์ในระดับ 3-5 โดยผู้ตรวจประเมินระบุชัดเจนว่า แม้ กทท. จะมีการประเมินความพึงพอใจและได้คะแนนสูงถึง 4.36 แต่ \"ควรมีการกำหนดผลลัพธ์และค่าเป้าหมาย ในทุกช่องทางที่มีการเผยแพร่รายงาน\" (หมายความว่า ถ้า กทท. แปะรายงานบน Facebook, Website และพิมพ์เล่ม ก็ต้องมีเป้าหมายและผลประเมินว่าคนอ่านผ่าน Facebook พอใจไหม คนอ่านผ่านเว็บพอใจไหม แยกให้ชัดเจน)"],
  actions:["รักษามาตรฐานการรายงานผลลัพธ์ทั้ง Output และ Outcome เอาไว้","เพิ่มการกำหนดค่าเป้าหมายเชิงปริมาณและสร้างแบบประเมินความพึงพอใจต่อรายงาน สำหรับการเผยแพร่ทาง Website และ Social Media โดยเฉพาะ","กทท. ทำได้ดีมากๆ ในเรื่องการทะลุเป้าหมายความพึงพอใจของรายงาน (ได้ 4.36 คะแนน) จนดันคะแนนภาพรวมมาแตะ 2.7000 ได้ แต่จุดที่พลาดไปนิดเดียวคือการ \"เหมาเข่งประเมินความพึงพอใจ\" โดยไม่ได้แยกตามช่องทางสื่อสารให้ครบถ้วน ดังนั้นเป้าหมายในปี 69 คือการกระจายแบบประเมินให้ครบทุกช่องทางที่ กทท. เอาไฟล์รายงานไปแปะไว้ เพียงเท่านี้ก็จะสามารถปิด Gap ข้อนี้ และเดินหน้าเก็บคะแนนระดับ 4-5 ได้สบายๆ "],
  docs:["รายงานประเมินความพึงพอใจต่อการรายงานผล (Omni-Channel Satisfaction Report): เอกสารที่แสดงการตั้งเป้าหมายและผลสำรวจความพึงพอใจของผู้อ่าน โดยแบ่งแยกตามช่องทางชัดเจน เช่น ผลประเมินจากผู้รับเล่มรายงาน, ผลประเมินจากผู้ดาวน์โหลด E-book ทางเว็บ, และผลประเมินจากสื่อโซเชียล","รายงานการพัฒนานวัตกรรมการสื่อสาร: นำผล AAR ไปปรับปรุงกระบวนการจัดทำรายงาน (เช่น การใช้ Infographic หรือ Dashboard) พร้อมตั้ง Process KPI วัดความสำเร็จ เช่น ลดต้นทุนการพิมพ์ หรือเพิ่มยอดคนเข้าชมรายงานผ่านเว็บ"],
  bp:["รฟม. มี Best Practice ที่ กทท. สามารถนำมาปรับใช้ได้ คือ รฟม. มีความโดดเด่นในการรายงานผลลัพธ์ทั้ง Output และ Outcome ได้อย่างครบถ้วน และมีการใช้ \"เว็บไซต์อย่างเป็นทางการ\" ในการเผยแพร่รายงานที่มีความโปร่งใสและเข้าถึงง่าย กทท. สามารถเรียนรู้รูปแบบการนำเสนอรายงานบนหน้าเว็บไซต์ให้ดึงดูดใจ Stakeholder จาก รฟม."],
  scopeNote:"มิตินี้มุ่งเน้นประเมินความโปร่งใสและการสื่อสารผลลัพธ์สู่สาธารณชน โดยมีความลึกซึ้งใน 5 ระดับ",
  dimLevels:["Level 1-2: มีแนวทางการรายงานผล และจัดทำรายงานที่ครอบคลุมกลุ่มเป้าหมาย วิธีการสร้างความสัมพันธ์ และผลลัพธ์ (Output/Outcome) ผ่านช่องทางต่างๆ เช่น รายงานประจำปี, รายงานความยั่งยืน, เว็บไซต์ หรือ โซเชียลมีเดีย","Level 3: รายงานผลได้ \"ครบถ้วน\" ตามองค์ประกอบที่เกณฑ์บังคับทุกประการ และเปิดเผยต่อสาธารณะ","Level 4: มีการนำรายงานนั้นไป \"ประเมินความพึงพอใจของผู้อ่าน/ผู้มีส่วนได้ส่วนเสีย\" และผลประเมินต้องผ่านเกณฑ์เป้าหมาย","Level 5: นำผลประเมินไปเรียนรู้ (AAR) พัฒนาเป็นนวัตกรรมการรายงานผล และจัดเก็บลงระบบดิจิทัล พร้อมทั้งคะแนนความพึงพอใจต้องมีแนวโน้มสูงขึ้นต่อเนื่อง 3-5 ปี"],
  minReqs:{1:["(L1-L2): แนวทางในการรายงานผลการดำเนินงานต่อสาธารณชน"],2:["(L1-L2): แนวทางในการรายงานผลการดำเนินงานต่อสาธารณชน","(L2-L3): เล่มรายงานประจำปี / รายงานการพัฒนาอย่างยั่งยืน ฉบับปีที่ถูกประเมิน","(L2-L3): ภาพหน้าเว็บไซต์ หรือสื่อสังคมออนไลน์ ที่มีเนื้อหารายงานผลการสร้างความสัมพันธ์"],3:["(L2-L3): เล่มรายงานประจำปี / รายงานการพัฒนาอย่างยั่งยืน ฉบับปีที่ถูกประเมิน","(L2-L3): ภาพหน้าเว็บไซต์ หรือสื่อสังคมออนไลน์ ที่มีเนื้อหารายงานผลการสร้างความสัมพันธ์"],4:["(L4-L5): รายงานผลการประเมินความพึงพอใจ \"ต่อรายงานผลการดำเนินงานฯ\" ของผู้มีส่วนได้ส่วนเสีย"],5:["(L4-L5): รายงานผลการประเมินความพึงพอใจ \"ต่อรายงานผลการดำเนินงานฯ\" ของผู้มีส่วนได้ส่วนเสีย","แบบบันทึก AAR กระบวนการรายงานผล และภาพหน้าจอระบบ SCM Knowledge Center"]},
  subComps:{2:["กลุ่มผู้มีส่วนได้ส่วนเสียที่มีการสร้างความสัมพันธ์","แนวทางและรูปแบบที่ใช้สร้างความสัมพันธ์","สายงาน/ฝ่ายงานที่รับผิดชอบ","ความถี่ในการสร้างความสัมพันธ์","ประเด็นและความต้องการ/คาดหวัง/กังวล","ผลลัพธ์ (Output และ Outcome)"],3:["กลุ่มผู้มีส่วนได้ส่วนเสียที่มีการสร้างความสัมพันธ์","แนวทางและรูปแบบที่ใช้สร้างความสัมพันธ์","สายงาน/ฝ่ายงานที่รับผิดชอบ","ความถี่ในการสร้างความสัมพันธ์","ประเด็นและความต้องการ/คาดหวัง/กังวล","ผลลัพธ์ (Output และ Outcome)"]}},
  {id:"3.3.3",grp:"3.3",gname:"การติดตามและรายงานผล (Monitoring and Reporting)",gw:10.0,gs68:2.7,name:"การเรียนรู้และปรับปรุง",w:4.0,s68:2.7,status:"ยังไม่เริ่ม",statusNote:"",
  good:["กทท. ให้ความสำคัญกับการเรียนรู้โดยนำเครื่องมือ การทบทวนผลการดำเนินงานหลังปฏิบัติการ (AAR) มาใช้เป็นเครื่องมือหลักในการประเมินประสิทธิภาพของ \"แผนสร้างความสัมพันธ์\" ","ในปี 2568 กทท. สามารถปิด Gap จากปีก่อนได้สำเร็จ ด้วยการนำระบบ AAR มาใช้ \"ครบทุกข้อย่อย\" และมีการจัดเก็บองค์ความรู้ (KM) เข้าสู่ระบบ SCM Knowledge Center อย่างเป็นรูปธรรม","มีการนำองค์ความรู้ที่อยู่ในระบบ KM มาใช้อ้างอิงและเป็นปัจจัยนำเข้าในการจัดทำแผนงานในปีถัดไป"],
  results:["ระดับ 1-5: กทท. ส่งเอกสารชุด \"รวม SM-AAR\" ครอบคลุมการทบทวนกระบวนการ และแนบเอกสาร \"คะแนนความพึงพอใจของผู้มีส่วนได้ส่วนเสีย\" เพื่อใช้เป็นหลักฐานแสดงให้เห็นถึงการเรียนรู้และปรับปรุงผลการดำเนินงาน"],
  gaps:["การนำผลการเรียนรู้ไปต่อยอดเป็น \"นวัตกรรมกระบวนการ\" ยังไม่เห็นผลเชิงประจักษ์ชัดเจน กทท. ทำ AAR ได้ดีแล้ว แต่ผลลัพธ์ที่ได้ยังไม่ถูกพัฒนาเป็นนวัตกรรมที่จับต้องได้","ยังขาดเอกสารวิเคราะห์ที่แสดงให้เห็นชัดเจนว่า การเรียนรู้และปรับปรุงนั้นส่งผลให้ \"คะแนนเกณฑ์ย่อยต่างๆ เพิ่มขึ้น\" ตามที่เกณฑ์ Level 4 และ 5 บังคับไว้","กทท. ได้คะแนนมาที่ 2.7000 หมายความว่าผู้ประเมินมองว่า กทท. มีกระบวนการเรียนรู้ด้วย AAR ที่ครอบคลุมข้อย่อยอย่างเป็นระบบแล้ว (ผ่าน L1-L2 และได้คะแนนบางส่วนใน L3) แต่จุดที่โดนหักคะแนนคือ \"การพัฒนานวัตกรรมจาก KM ยังไม่เห็นผลกระทบเชิงประจักษ์\" ผู้ตรวจต้องการเห็นหลักฐานว่าเมื่อ กทท. เรียนรู้จากข้อผิดพลาดแล้ว ได้นำไปปรับเป็น \"นวัตกรรมกระบวนการใหม่\" ที่ช่วยลดเวลา ลดต้นทุน หรือทำให้คะแนนความผูกพันเพิ่มสูงขึ้นได้อย่างไ"],
  actions:["ต้องนำองค์ความรู้ (Lesson Learned) จาก SCM Knowledge Center ไปต่อยอดสร้าง \"นวัตกรรมกระบวนการ (Process Innovation)\" ที่มีคุณภาพ และต้องระบุตัวชี้วัด (Process KPI) ให้ชัดเจนว่านวัตกรรมนี้ช่วยลดเวลาหรือลดต้นทุนให้ กทท. ได้จริง","ต้องแสดงให้ผู้ประเมินเห็นว่าผลจากการปรับปรุงงาน ส่งผลให้ \"คะแนนการประเมินย่อย\" ในหมวด SM ดีขึ้นอย่างเป็นรูปธรรม","กทท. สอบผ่านกระบวนการพื้นฐานมาได้สวยงามด้วยการทำ AAR ครบทุกข้อย่อยและนำขึ้นระบบดิจิทัล (ได้ 2.7000) แต่การจะคว้าคะแนนเต็มจากผู้ประเมินได้นั้น ปี 2569 กทท. ต้องก้าวข้ามจากคำว่า \"ถอดบทเรียน\" ไปสู่คำว่า \"สร้างนวัตกรรมกระบวนการ\" ให้ได้ และต้องโชว์ตัวเลขให้กรรมการเห็นชัดๆ ว่าความพยายามทั้งหมดทำให้ กทท. ได้รับคำชมและ \"คะแนนในข้อย่อยต่างๆ เพิ่มขึ้น\" อย่างแท้จริง"],
  docs:["รายงานนวัตกรรมกระบวนการด้าน SCM (SCM Process Innovation Report): เอกสารชิ้นโบแดงที่สรุปว่าผลจาก AAR ถูกนำมาสร้างเป็น \"วิธีทำงานแบบใหม่ (นวัตกรรม)\" อะไรบ้าง พร้อมแสดง Process KPI (เช่น สามารถจัดเก็บฐานข้อมูล Stakeholder ได้แม่นยำขึ้น 20% หรือลดระยะเวลารวบรวมข้อมูลได้ 5 วัน)","ตารางรายงานเปรียบเทียบคะแนนและผลสัมฤทธิ์ (Year-over-Year Score Improvement): ตารางที่แสดงให้เห็นชัดเจนว่า จากการปรับปรุงงานทั้งหมด ทำให้คะแนนประเมินในหมวดเกณฑ์ย่อยต่างๆ ในปี 69 \"เพิ่มขึ้น\" ทุกหัวข้อ เมื่อเทียบกับปี 68 (เพื่อตอบโจทย์ Level 4 และ Level 5 โดยตรง)"],
  bp:["ในประเด็นนี้ รฟม. มีความโดดเด่นและเป็น Best Practice ในเรื่องการมี \"กระบวนการเรียนรู้และทบทวนปรับปรุงครอบคลุมครบทุกเกณฑ์ย่อยที่สำคัญ\" กทท. สามารถเทียบเคียงความเข้มข้นของการตามรอยผลลัพธ์ของ รฟม. มาเป็นแนวทางในการทำตารางสรุปผลได้"],
  scopeNote:"มิตินี้มุ่งเน้นประเมิน \"การถอดบทเรียน\" และ \"การนำความรู้ไปปรับปรุงงาน\" โดยมีความเข้มข้นของการให้คะแนนใน 5 ระดับ",
  dimLevels:["Level 1: มีกระบวนการเรียนรู้และปรับปรุงการบริหารจัดการผู้มีส่วนได้ส่วนเสีย แต่ยังไม่เป็นระบบชัดเจน","Level 2: มีกระบวนการเรียนรู้ฯ แต่ \"ไม่ครอบคลุม\" ทุกเกณฑ์ย่อยที่สำคัญ","Level 3: มีกระบวนการเรียนรู้ฯ และ \"ครอบคลุมทุกเกณฑ์ย่อยที่สำคัญ\" อย่างเป็นระบบ","Level 4: ครอบคลุมทุกเกณฑ์ย่อย และ คะแนนเกณฑ์ย่อยด้านการมุ่งเน้นผู้มีส่วนได้ส่วนเสียมีคะแนนเพิ่มขึ้นบางหัวข้อ","Level 5: ครอบคลุมทุกเกณฑ์ย่อย และ คะแนนเกณฑ์ย่อยด้านการมุ่งเน้นผู้มีส่วนได้ส่วนเสียมีคะแนนเพิ่มขึ้นทุกหัวข้อ"],
  minReqs:{1:["(L1-L5): เอกสารแนวทางในการทบทวนและปรับปรุงกระบวนการทุกกระบวนการตามเกณฑ์ย่อย (เช่น แบบบันทึก AAR และหลักฐานคะแนนต่างๆ)"],2:["(L1-L5): เอกสารแนวทางในการทบทวนและปรับปรุงกระบวนการทุกกระบวนการตามเกณฑ์ย่อย (เช่น แบบบันทึก AAR และหลักฐานคะแนนต่างๆ)"],3:["(L1-L5): เอกสารแนวทางในการทบทวนและปรับปรุงกระบวนการทุกกระบวนการตามเกณฑ์ย่อย (เช่น แบบบันทึก AAR และหลักฐานคะแนนต่างๆ)"],4:["(L1-L5): เอกสารแนวทางในการทบทวนและปรับปรุงกระบวนการทุกกระบวนการตามเกณฑ์ย่อย (เช่น แบบบันทึก AAR และหลักฐานคะแนนต่างๆ)"],5:["(L1-L5): เอกสารแนวทางในการทบทวนและปรับปรุงกระบวนการทุกกระบวนการตามเกณฑ์ย่อย (เช่น แบบบันทึก AAR และหลักฐานคะแนนต่างๆ)"]},

hcm:{
  dimId:"6", dimName:"HCM — การบริหารทุนมนุษย์", orig:3.0740, color:"hcm",
  subs:[
  {id:"1.1",grp:"1",gname:"ยุทธศาสตร์/กลยุทธ์ HR และการขับเคลื่อน",gw:30,gs68:3.15,name:"คุณภาพยุทธศาสตร์ HR (สื่อสาร/ติดตาม/ผลลัพธ์)",w:20,s68:3.0,status:"ยังไม่เริ่ม",statusNote:"",
  good:["กทท. มีการวางระบบพื้นฐานที่ดีมาก ทั้งในแง่การจัดทำแผนยุทธศาสตร์ที่สอดรับกับวิสัยทัศน์ขององค์กร การตั้งคณะกรรมการ มีการแปลงแผนลงสู่ระดับปฏิบัติการ 9 แผนงาน และมีกลไกการติดตามผลอย่างชัดเจนเป็นรายไตรมาส"],
  results:["มีการแปลงยุทธศาสตร์เป็นแผนปฏิบัติการ 9 แผนงาน/โครงการ กำหนดตัวชี้วัดครอบคลุม Output/Outcome มีกรอบเวลา ผู้รับผิดชอบ และกลไกรายงานผลรายไตรมาสต่อ กนบ.","อ้างว่ามีการบูรณาการแผน HR กับระบบงานสำคัญ เช่น RM, DT, KM, IM, SCM โดยแสดงเป็นตารางความเชื่อมโยง","อ้างว่ามีการใช้ข้อมูลจาก Feedback Report ปี 2567, ผลสำรวจ, HR Trends และโครงการร่วมกับ กฟภ. มาปรับปรุงแผนแม่บท HR ปี 2569","มีการกำหนดวิสัยทัศน์และจัดทำตำแหน่งเชิงยุทธศาสตร์ด้าน HR แบ่งเป็น 3 ระยะ (สั้น กลาง ยาว) ที่สอดรับกับแผนวิสาหกิจ"],
  gaps:["คู่เทียบไม่สอดคล้อง: กทท. ใช้ กทพ., รฟม., กฟผ., ธอส. แต่ผู้ประเมินระบุว่าต้องเปลี่ยนเป็นท่าเรือระดับโลกตามแผนวิสาหกิจ","ตัวชี้วัดผลลัพธ์ยังไม่ถึงมาตรฐานสากล: ต้องกำหนดตัวชี้วัดด้าน HR ตามแนวปฏิบัติระดับสากล","การบูรณาการยังเป็นแค่บนแผ่นกระดาษ: ต้องพิสูจน์ว่ามีการร่วมกันดำเนินงานจริง ไม่ใช่แค่ตาราง Mapping","ขาดการแสดงประสิทธิผลหลังการปรับปรุง: ต้องแสดงว่าการทบทวนแผนทำให้เกิดประสิทธิภาพดีขึ้น (Before/After)"],

cm:{
  dimId:"4.2", dimName:"CM — การมุ่งเน้นลูกค้า", orig:3.4225, color:"cm",
  subs:[
  {id:"1.1",grp:"1",gname:"ยุทธศาสตร์ด้านลูกค้าและตลาด",gw:10.0,gs68:3.5,name:"ยุทธศาสตร์ด้านลูกค้าและตลาด",w:10.0,s68:3.5,status:"ยังไม่เริ่ม",statusNote:"",
  good:["การจัดทำแผนยุทธศาสตร์ที่ครอบคลุม: กทท. มีการวิเคราะห์ปัจจัยนำเข้า (SWOT), กำหนดความท้าทาย/ความได้เปรียบเชิงยุทธศาสตร์, และเป้าหมายตามแผนยุทธศาสตร์ด้านลูกค้าและตลาดปี 2566-2570 ที่ชัดเจน","การบูรณาการแผนงาน: มีการระบุความสอดคล้องกับแผนวิสาหกิจและแผนแม่บทอื่น ๆ เช่น แผนด้านผู้มีส่วนได้ส่วนเสีย, ทรัพยากรบุคคล (HCM), การจัดการความรู้ (KM) และดิจิทัล (DT)","การอนุมัติและการถ่ายทอดเป้าหมาย: แผนยุทธศาสตร์ผ่านความเห็นชอบจากคณะกรรมการ กทท. อย่างเป็นทางการ มีการถ่ายทอดตัวชี้วัด (KPI) ลงสู่ระดับหน่วยงานและรายบุคคล รวมถึงสื่อสารให้ผู้มีส่วนได้ส่วนเสียภายนอกรับทราบ"],
  results:["กทท. ส่งเอกสารครอบคลุมตั้งแต่ระดับ 1-5 เช่น ผังกระบวนการ (SIPOC) การจัดทำแผน, แผนยุทธศาสตร์ด้านลูกค้าฯ 2566-2570 และแผนปฏิบัติการปี 2569, มติบอร์ดอนุมัติแผน, ระบบติดตามรายงานแผน (Dashboard), และการถอดบทเรียนด้วย AAR (AAR_1.1_แผนยุทธศาสตร์ลูกค้า) ลงระบบ KM Portal"],
  gaps:["การบูรณาการโดยใช้แผนลูกค้าเป็น \"ตัวตั้ง\": การเชื่อมโยงกับยุทธศาสตร์อื่นๆ ยังขาดความชัดเจนในการนำยุทธศาสตร์ลูกค้าและตลาดมาเป็นศูนย์กลาง (Customer-centric) ในการขับเคลื่อนแผนแม่บทอื่น","ความสอดคล้องของเป้าหมายและตัวชี้วัดในการปรับปรุงกระบวนการ: การกำหนดวัตถุประสงค์ เป้าหมาย และตัวชี้วัดในการทบทวนหรือพัฒนานวัตกรรมกระบวนการจัดทำแผนฯ ยังขาดความสอดคล้องกัน","การติดตามและปรับปรุงกลยุทธ์: กทท. มีการรายงานผล แต่ยังขาดกระบวนการพยากรณ์หรือคาดการณ์ (Forecasting) ผลสำเร็จล่วงหน้าอย่างเป็นระบบ เพื่อนำข้อมูลมาใช้ตัดสินใจปรับเปลี่ยนกลยุทธ์หากแนวโน้มผลการดำเนินงานไม่เป็นไปตามเป้าหมาย","ความสอดคล้องของกรอบเวลา: การทบทวนแผนงานยังขาดความสอดคล้องกับกรอบเวลาของกระบวนการวางแผนเชิงกลยุทธ์ (SP) ในภาพรวมขององค์กร"],
  actions:["บูรณาการแผนเชิงรุก: นำข้อมูลจากกลุ่มลูกค้าย่อย (Sub-segment) และเสียงลูกค้า (VOC) มาคาดการณ์ผลประกอบการ หากพบว่ามีแนวโน้มไม่ได้ตามเป้าหมาย ต้องมีกระบวนการนำเสนอทบทวนเพื่อปรับเปลี่ยนกลยุทธ์ (Pivot) ระหว่างปีได้ทันที","ปรับปรุงการประเมินนวัตกรรมกระบวนการ: การทำ AAR เพื่อปรับปรุงกระบวนการทำแผนยุทธศาสตร์ ต้องมีการตั้ง Process KPI ที่วัดผลได้จริง และสะท้อนลงในระบบ KM อย่างเป็นรูปธรรม","กทท. สอบผ่านกระบวนการทำแผนยุทธศาสตร์ในระดับโครงสร้างได้อย่างดีเยี่ยมจนทำคะแนนได้ 3.5000 แต่คะแนนถูกจำกัดไว้ไม่ให้ถึงระดับ 4-5 เนื่องจากผู้ตรวจประเมินต้องการเห็น ความคล่องตัว (Agility) ในการใช้ข้อมูลลูกค้ามาพยากรณ์ทิศทางอนาคต (Forecasting) หากเป้าหมายมีแนวโน้มพลาดเป้า กทท. ต้องมีระบบปรับแผน (Pivot) ได้ทันที นอกจากนี้ การบูรณาการยุทธศาสตร์จะต้องแสดงให้เห็นว่า \"แผนลูกค้า\" คือศูนย์กลาง (Customer-centric) ที่ส่งผลกระทบไปถึงการตั้งเป้าหมายในแผนอื่นๆ ขององค์กรอย่างแท้จริง หากเสริมเอกสารรายงานการพยากรณ์และตารางเชื่อมโยงเหล่านี้ได้ จะสามารถดันคะแนนขึ้นสู่ระดับ 4.0000 - 5.0000 ได้ในปี 2569"],
  docs:["ตารางแสดงความเชื่อมโยงยุทธศาสตร์ (Alignment Matrix): ที่แสดงให้เห็นชัดเจนว่า \"แผนยุทธศาสตร์ลูกค้าและตลาด\" ถูกใช้เป็น ปัจจัยนำเข้า (Input) หรือเป็นตัวตั้ง ในการจัดทำแผนวิสาหกิจ (SP) และแผนแม่บทอื่น","รายงานการติดตามผลและคาดการณ์ล่วงหน้า (Forecasting & Tracking Report): รายงานรายไตรมาสที่แสดงผลเปรียบเทียบกับเป้าหมาย พร้อมระบุ \"การคาดการณ์ผลการดำเนินงาน ณ สิ้นปี\"","บันทึกมติการปรับเปลี่ยนกลยุทธ์ (Strategy Revision Record): หลักฐานที่แสดงว่าเมื่อมีการคาดการณ์ว่าผลงานจะไม่บรรลุเป้า ผู้บริหารได้มีข้อสั่งการปรับแผนงาน/โครงการระหว่างปีเพื่อแก้ไขสถานการณ์"],
  bp:["กทพ. (EXAT): มีกลไกการสื่อสารและถ่ายทอดเป้าหมายระดับยุทธศาสตร์ลงสู่ระดับปฏิบัติการและ ระดับบุคคล ได้อย่างเป็นรูปธรรมและมีกลไกกำกับติดตามที่ชัดเจนเข้มข้น","รฟม. (MRTA): มีจุดเด่นด้านกระบวนการติดตามวิเคราะห์ โดยมีการนำข้อมูลมา คาดการณ์ผลสำเร็จ (Forecasting) ของแผนปฏิบัติการด้านลูกค้าและตลาดล่วงหน้า เพื่อเตรียมความพร้อมในการรับมือและปรับกลยุทธ์"],
  scopeNote:"มิตินี้มุ่งเน้นประเมินความสามารถขององค์กรในการนำข้อมูลสารสนเทศที่เกี่ยวกับลูกค้าและตลาด มาวิเคราะห์สภาพแวดล้อมเพื่อกำหนดทิศทางเชิงยุทธศาสตร์ระยะยาว พร้อมทั้งแปลงแผนไปสู่การปฏิบัติ สื่อสารถ่ายทอดเป้าหมาย และติดตามผลลัพธ์อย่างเป็นระบบ รวมถึงบูรณาการกับแผนงานอื่นๆ ขององค์กร",
  dimLevels:["Level 1 (ความครอบคลุมของข้อมูล): องค์กรมีแผนยุทธศาสตร์ และมีหลักฐานว่ามีการรวบรวมข้อมูลสารสนเทศต่างๆ ของลูกค้ามาเป็นพื้นฐานในการทำแผน","Level 2 (การวิเคราะห์เชิงกลยุทธ์): องค์กรสามารถนำข้อมูลสารสนเทศจาก Level 1 มาวิเคราะห์จุดแข็ง จุดอ่อน โอกาส และอุปสรรค (SWOT Analysis) เพื่อนำไปกำหนดทิศทางยุทธศาสตร์ลูกค้าได้","Level 3 (การอนุมัติ การถ่ายทอด และการวัดผล): แผนยุทธศาสตร์ต้องได้รับไฟเขียวจากบอร์ดบริหาร และถูกแปลงเป็นแผนปฏิบัติการประจำปี (Action Plan) มีการนำไปสื่อสารให้ผู้ที่เกี่ยวข้องนำไปปฏิบัติ และต้องมีกระบวนการติดตามผลสัมฤทธิ์ที่ทำได้ตามเป้า","Level 4 (การบูรณาการและการทบทวนกระบวนการ): ยุทธศาสตร์ลูกค้าต้องไม่แยกส่วน แต่ต้องมีความเชื่อมโยง (Alignment) ไปขับเคลื่อนยุทธศาสตร์และแผนแม่บทด้านอื่นๆ ขององค์กร และมีการทบทวนกระบวนการจัดทำแผน","Level 5 (นวัตกรรมและการจัดเก็บความรู้): องค์กรมีการถอดบทเรียน (AAR) จากการทำยุทธศาสตร์ และนำข้อค้นพบไปจัดเก็บในระบบดิจิทัลเพื่อสร้างเป็นองค์ความรู้หรือนวัตกรรมกระบวนการต่อไป"],
  minReqs:{1:["แผนยุทธศาสตร์ด้านลูกค้าและตลาด ฉบับปัจจุบัน","เอกสารที่แสดงถึงการวิเคราะห์สารสนเทศต่างๆ เพื่อจัดทำยุทธศาสตร์ด้านลูกค้าและตลาด"],2:["แผนยุทธศาสตร์ด้านลูกค้าและตลาด ฉบับปัจจุบัน","แผนยุทธศาสตร์ด้านลูกค้าและตลาด ฉบับปัจจุบัน"],3:["รายงานการประชุมคณะกรรมการรัฐวิสาหกิจ (บอร์ด กทท.) หรือคณะอนุกรรมการที่เกี่ยวข้องที่มีวาระ \"ให้ความเห็นชอบ/อนุมัติ\" แผนยุทธศาสตร์ด้านลูกค้าและตลาด","แผนปฏิบัติการประจำปีด้านลูกค้าและตลาด ภายใต้แผนยุทธศาสตร์ฯ","เอกสาร/หลักฐาน ที่แสดงถึงการถ่ายทอดสื่อสารแผนปฏิบัติการ ไปยังหน่วยงานทั้งภายในและภายนอกที่เกี่ยวข้อง","รายงานผลการดำเนินงานตามแผนยุทธศาสตร์ด้านลูกค้า โดยแสดงให้เห็นถึงความก้าวหน้า/ความสำเร็จในระดับยุทธศาสตร์และตามแผนปฏิบัติการ ผลผลิต (Output) และผลลัพธ์ (Outcome)"],4:["เอกสารแสดงขั้นตอน วิธีการ กระบวนการ (เช่น SIPOC) ในการจัดทำแผนยุทธศาสตร์ด้านลูกค้าและตลาด","เอกสารที่แสดง ความเชื่อมโยง (Alignment) แผนยุทธศาสตร์ด้านลูกค้าและตลาดกับแผนแม่บทด้านอื่นๆ","เอกสารที่แสดงถึงการทบทวนกระบวนการจัดทำแผนยุทธศาสตร์ด้านลูกค้าและตลาด"],5:["เอกสารที่แสดงถึงกระบวนการเรียนรู้และจัดการความรู้ (เช่น AAR) ในเรื่องการจัดทำแผนยุทธศาสตร์ด้านลูกค้าและตลาด","ภาพตัวอย่างหน้าจอระบบดิจิทัล (เช่น KM Portal) ที่มีการจัดเก็บองค์ความรู้ด้านการจัดทำแผนยุทธศาสตร์ด้านลูกค้าและตลาด"]},

  {id:"2.1",grp:"2",gname:"การจำแนกลูกค้า",gw:5.0,gs68:3.5,name:"การจำแนกลูกค้า",w:5.0,s68:3.5,status:"ยังไม่เริ่ม",statusNote:"",
  good:["การวิเคราะห์เกณฑ์พฤติกรรม: กทท. มีการนำข้อมูลสารสนเทศด้านพฤติกรรมมาจำแนกลูกค้า โดยแบ่งจาก 4 กลุ่มหลัก กรองข้อมูลลูกค้าแบบ Waterfall จนสามารถจัดเป็น กลุ่มลูกค้าย่อย 3 กลุ่ม ได้แก่ กลุ่ม Special, กลุ่ม Premium และกลุ่มทั่วไป (Standard)","การเชื่อมโยงกับเป้าหมาย: มีการวิเคราะห์เพื่อหาความต้องการที่ซ่อนอยู่ (Unmet Needs) และเชื่อมโยงผลการจำแนกให้เข้ากับการกำหนดตำแหน่งทางยุทธศาสตร์ (Strategic Positioning) และ Value Proposition ขององค์กร"],
  results:["กทท. ส่งเอกสารครอบคลุมตั้งแต่ระดับ 1-5 เช่น ผังกระบวนการ (SIPOC) การจำแนกลูกค้า, มติคณะกรรมการฝ่ายบริหารเห็นชอบผลการจำแนก, ข้อมูลสำคัญตามกลุ่มลูกค้า (Customer Segment Profile) ปี 2568, แผนยุทธศาสตร์ที่รองรับ, รวมถึงการประเมินประสิทธิผลด้วย AAR (AAR_2.1_การจำแนกลูกค้า)"],
  gaps:["ความชัดเจนในการสื่อสาร (Communication): กทท. มีปัญหาเรื่องความคลาดเคลื่อนในการสื่อสาร โดยระบุในเอกสารว่าเป็น \"การเปลี่ยนกลุ่มลูกค้าใหม่ 3 กลุ่ม\" ซึ่งทำให้ผู้ประเมินเข้าใจว่า กทท. ทิ้งฐานลูกค้า 4 กลุ่มหลักเดิม แทนที่จะสื่อสารให้ชัดเจนว่านี่คือ \"การแบ่งกลุ่มลูกค้าย่อย (Sub-segment)\"","ความสมบูรณ์ของข้อมูลคุณลักษณะลูกค้า: กทท. ยังขาดการจัดทำข้อมูลกลุ่มลูกค้า (Customer Segment Profile) เชิงลึกของกลุ่มย่อยทั้ง 3 กลุ่ม ที่ครอบคลุมถึงพฤติกรรม ความต้องการ (Unmet needs) และช่องทางที่เหมาะสมอย่างละเอียด","กระดุมเม็ดแรกผิดพลาด: ผู้ตรวจประเมินเน้นย้ำว่า การจำแนกกลุ่มลูกค้าคือ \"กระดุมเม็ดแรก\" หากสื่อสารว่าเปลี่ยนกลุ่มใหม่โดยไม่มี Profile ที่ชัดเจนรองรับ จะทำให้การนำข้อมูลลูกค้าไปใช้ทบทวนแผนยุทธศาสตร์ บริการ และกระบวนการธุรกิจอื่นๆ ผิดเพี้ยน และไม่เป็นไปในทิศทางเดียวกัน (Alignment) ทั่วทั้งองค์กร"],
  actions:["\"ซ่อมกระดุมเม็ดแรก\": ปรับแก้ไขเอกสารการนำเสนอทั้งหมดให้ชัดเจนว่า กทท. \"ไม่ได้เปลี่ยนกลุ่มลูกค้าใหม่\" แต่เป็นการ \"แบ่งกลุ่มลูกค้าย่อย (Sub-segment)\" ภายใต้ฐานลูกค้าเดิม","ทำ Profile ให้ลึกและนำไปใช้บูรณาการ: ต้องจัดทำ Customer Segment Profile แบบละเอียดแยกลูกค้าย่อย (Special, Premium, Standard) และนำ Profile นี้ไปใช้บูรณาการ (Alignment) ปรับปรุงกระบวนการอื่นๆ เช่น ปรับแบบสำรวจความพึงพอใจ ปรับการรับฟังเสียงลูกค้า (VOC) ปรับเส้นทางลูกค้า (Customer Journey) และแผนสร้างความสัมพันธ์ (CRM) ให้เข้ากับกลุ่มย่อยนี้อย่างแท้จริง","กทท. ทำได้ดีในการวิเคราะห์ข้อมูลจนตกผลึกออกมาเป็นกลุ่มย่อย 3 กลุ่ม ซึ่งตอบโจทย์กลยุทธ์ แต่กลับตกม้าตายในเรื่อง \"การตั้งชื่อและการสื่อสารในเอกสาร\" จนถูกหักคะแนนความสมบูรณ์เหลือ 3.5000\n ดังนั้นเป้าหมาย (Quick Win) ในข้อนี้ของปี 2569 คือการแก้ไขการสื่อสาร เปลี่ยนคำว่า \"กลุ่มใหม่\" เป็นคำว่า \"ลูกค้าย่อย (Sub-segment)\" ทำ Profile ให้แน่น และพิสูจน์ให้ผู้ตรวจเห็นการบูรณาการ (Integration) นำ Profile นี้ไปเป็นสารตั้งต้นในการทำงานของทุกกระบวนการ หากทำได้เช่นนี้ คะแนนในข้อ 2.1 จะสามารถดันขึ้นสู่ระดับ 4.0000 และเป็นฐานที่ดีในการดันคะแนนหมวดอื่นต่อไปได้อย่างแน่นอน"],
  docs:["เอกสารมติ/บันทึกการสื่อสารที่ถูกต้อง: เอกสารแจ้งมติที่ประชุมผู้บริหารที่อนุมัติ \"การแบ่งกลุ่มลูกค้าย่อย (Sub-segment)\" โดยใช้ถ้อยคำที่ถูกต้องชัดเจน","Customer Segment Profile ฉบับสมบูรณ์ (Deep Profile): เอกสารที่มีการแยกสไลด์ชัดเจนว่า กลุ่ม Special, Premium, Standard มีพฤติกรรมอย่างไร ต้องการอะไร (Unmet needs) และควรสื่อสารด้วยช่องทางไหน","ตารางแสดงความเชื่อมโยง (Alignment Matrix): เอกสารที่พิสูจน์ให้ผู้ประเมินเห็นว่า กทท. ได้นำข้อมูล \"กลุ่มลูกค้าย่อย\" ไปปรับใช้เป็นปัจจัยนำเข้าในการทำแผนยุทธศาสตร์ (SP) และปรับกระบวนการอื่นๆ แล้ว"],
  bp:["กทพ. (EXAT): ได้รับคำชมว่ามีการกำหนดวัตถุประสงค์และจำแนกลูกค้าอย่างชัดเจน มีการจัดทำข้อมูลกลุ่มลูกค้า (Customer Segment Profile) ที่ระบุคุณลักษณะครบถ้วนทุกกลุ่ม และที่สำคัญคือ สามารถนำผลการจำแนกส่วนตลาดเป้าหมาย ไปใช้ในการจัดทำแผนยุทธศาสตร์ และปรับปรุงกระบวนการทางธุรกิจได้อย่างเป็นรูปธรรม ตลอดจนมีการประเมินประสิทธิผลของการจำแนกอย่างเป็นระบบ"],
  scopeNote:"มิตินี้มุ่งเน้นประเมินความสามารถขององค์กรในการก้าวข้ามการแบ่งกลุ่มลูกค้าแบบดั้งเดิม (เช่น แบ่งตามประเภทธุรกิจ หรือภูมิศาสตร์) ไปสู่การนำข้อมูลสารสนเทศเชิงลึกมาวิเคราะห์ เพื่อจัดกลุ่มลูกค้าเป้าหมาย และ \"กลุ่มลูกค้าย่อย (Sub-segment)\" อย่างมีนัยสำคัญทางธุรกิจ จากนั้นต้องจัดทำคุณลักษณะเฉพาะ (Customer Segment Profile) เพื่อเป็นเข็มทิศให้ทุกหน่วยงานในองค์กรนำไปใช้กำหนดกลยุทธ์ พัฒนาบริการ และสร้างความสัมพันธ์ได้อย่างเฉพาะเจาะจง (Personalization)",
  dimLevels:["Level 1 (การจำแนกแบบดั้งเดิม): องค์กรมีแนวทางการจำแนกลูกค้า โดยใช้ตัวแปรพื้นฐาน เช่น ผลิตภัณฑ์ที่มี, ประชากรศาสตร์ (Demographic), ภูมิศาสตร์ (Geographic) หรือขนาดธุรกิจ (Firmographic)","Level 2 (การวิเคราะห์เชิงลึกเพื่อหาตัวแปร): กำหนดวัตถุประสงค์ชัดเจน และนำข้อมูลที่หลากหลาย (ลูกค้าปัจจุบัน, ลูกค้าคู่แข่ง, ผู้ที่อาจเป็นลูกค้าในอนาคต) มาประยุกต์ใช้กับเครื่องมือทางสถิติ เพื่อกำหนดตัวแปรที่เหมาะสมในการจำแนกและระบุ \"ตลาดเป้าหมาย\"","Level 3 (การจัดทำ Profile และสื่อสาร): นำผลการจำแนกมาจัดทำ Customer Segment Profile (ข้อมูลคุณลักษณะเฉพาะของกลุ่มลูกค้า) อย่างชัดเจน และต้องมีการสื่อสารถ่ายทอดให้คนในองค์กรรับทราบทั่วกัน","Level 4 (การนำไปใช้จริงแบบบูรณาการ): นำผลการจำแนกลูกค้า (Profile) ไปปฏิบัติใช้จริงในทิศทางเดียวกัน ทั้งการทำแผนยุทธศาสตร์ลูกค้า, การพัฒนาผลิตภัณฑ์/บริการ, และปรับปรุงกระบวนการทางธุรกิจที่สำคัญ","Level 5 (การประเมินประสิทธิผลและนวัตกรรม): มีการประเมิน \"ประสิทธิผลของการจำแนกลูกค้า\" นำผลไปเรียนรู้ (KM) ทบทวนผ่านระบบดิจิทัล เพื่อปรับปรุงและสร้างนวัตกรรมในกระบวนการจำแนก"],
  minReqs:{1:["เอกสารแนวทาง/กระบวนการในการจำแนกลูกค้าและส่วนตลาด"],2:["เอกสารที่แสดงการระบุวัตถุประสงค์ของการจำแนกลูกค้าและส่วนตลาด","คู่มือการจำแนกลูกค้า","เอกสารการวิเคราะห์ และสารสนเทศที่ใช้ในการจำแนกลูกค้าและตลาด (เช่น การวิเคราะห์ปัจจัยพฤติกรรม, ข้อมูลคู่แข่ง)"],3:["เอกสารข้อมูลกลุ่มลูกค้า (Customer Segment Profile) ที่ชัดเจนและสมบูรณ์"],4:["แผนปฏิบัติการประจำปี ภายใต้แผนยุทธศาสตร์ด้านลูกค้าและตลาด (ที่สอดคล้องกับกลุ่มลูกค้าเป้าหมาย)","รายงานผลการดำเนินงานตามแผนปฏิบัติการดังกล่าว (เพื่อยืนยันการนำไปปฏิบัติใช้จริง)"],5:["เอกสารแนวทางและการประเมินประสิทธิผลของการจำแนกลูกค้าและส่วนตลาด","เอกสารที่แสดงถึงกระบวนการเรียนรู้และจัดการความรู้ (KM/AAR) ในเรื่องการจำแนกลูกค้าและตลาด","ภาพตัวอย่างหน้าจอระบบดิจิทัล ที่มีการจัดเก็บองค์ความรู้ในการจำแนกลูกค้าและตลาด"]},
